<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نشانی ما | شهدای گمنام شورابیل</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #f8fafc;
      --bg2: #f1f5f9;
      --bg3: #e2e8f0;
      --primary: #0d9488;
      --primary-dark: #0f766e;
      --primary-light: #5eead4;
      --primary-rgb: 13, 148, 136;
      --dark: #0f172a;
      --text: #334155;
      --text-light: #94a3b8;
      --white: #ffffff;
      --card-bg: #ffffff;
      --card-border: #e2e8f0;
      --shadow: 0 2px 12px rgba(0,0,0,0.04);
      --header-bg: #ffffff;
      --footer-bg: #ffffff;
      --logo-filter: none;
      --tab-active-bg: #ffffff;
      --tab-bg: #f1f5f9;
    }
    
    [data-theme="dark"] {
      --bg: #0f172a;
      --bg2: #1e293b;
      --bg3: #334155;
      --primary: #14b8a6;
      --primary-dark: #0d9488;
      --primary-light: #5eead4;
      --primary-rgb: 20, 184, 166;
      --dark: #f1f5f9;
      --text: #cbd5e1;
      --text-light: #64748b;
      --white: #1e293b;
      --card-bg: #1e293b;
      --card-border: #334155;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
      --header-bg: #1e293b;
      --footer-bg: #1e293b;
      --logo-filter: brightness(0) invert(1);
      --tab-active-bg: #1e293b;
      --tab-bg: #0f172a;
    }
    
    [data-muharram="true"] {
      --primary: #dc2626;
      --primary-dark: #b91c1c;
      --primary-light: #fca5a5;
      --primary-rgb: 220, 38, 38;
    }
    
    [data-theme="dark"][data-muharram="true"] {
      --primary: #ef4444;
      --primary-dark: #dc2626;
      --primary-light: #fca5a5;
      --primary-rgb: 239, 68, 68;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
    }
    
    .header {
      background: var(--header-bg);
      box-shadow: 0 1px 8px rgba(0,0,0,0.03);
      padding: 14px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--bg3);
      transition: all 0.3s ease;
    }
    
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      max-width: 1100px;
      margin: 0 auto;
    }
    
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .header-logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 12px rgba(var(--primary-rgb), 0.2);
      overflow: hidden;
      padding: 6px;
    }
    
    .header-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: var(--logo-filter);
    }
    
    .header-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--dark);
      transition: color 0.3s;
    }
    
    .header-subtitle {
      font-size: 10px;
      color: var(--text-light);
      transition: color 0.3s;
    }
    
    .header-btns {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .back-btn {
      background: var(--bg2);
      border: none;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      color: var(--text);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      text-decoration: none;
    }
    
    .back-btn:hover {
      background: var(--primary);
      color: #fff;
    }
    
    .theme-toggle {
      background: var(--bg2);
      border: none;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      color: var(--text);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
    }
    
    .theme-toggle:hover {
      background: var(--primary);
      color: #fff;
      transform: rotate(15deg);
    }
    
    .main-container {
      flex: 1;
      max-width: 1100px;
      width: 100%;
      margin: 20px auto;
      padding: 0 12px;
    }
    
    .page-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.3s;
    }
    
    .address-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.3s ease;
    }
    
    .address-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
      flex-shrink: 0;
    }
    
    .address-text {
      flex: 1;
    }
    
    .address-text h4 {
      font-size: 14px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 2px;
    }
    
    .address-text p {
      font-size: 11px;
      color: var(--text-light);
    }
    
    .copy-btn {
      background: var(--bg2);
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      color: var(--primary-dark);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      font-family: inherit;
    }
    
    .copy-btn:hover {
      background: var(--primary);
      color: #fff;
    }
    
    .map-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 0;
      background: var(--bg2);
      border-radius: 12px 12px 0 0;
      padding: 4px;
    }
    
    .map-tab {
      flex: 1;
      padding: 10px 16px;
      border: none;
      background: transparent;
      color: var(--text-light);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: inherit;
    }
    
    .map-tab.active {
      background: var(--tab-active-bg);
      color: var(--primary-dark);
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    
    .map-tab:hover:not(.active) {
      color: var(--dark);
    }
    
    .map-container {
      background: var(--card-bg);
      border-radius: 0 0 12px 12px;
      overflow: hidden;
      border: 1px solid var(--card-border);
      border-top: none;
      box-shadow: var(--shadow);
      height: 500px;
      position: relative;
    }
    
    .map-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    
    .map-container iframe.active {
      opacity: 1;
      pointer-events: all;
    }
    
    .footer {
      text-align: center;
      padding: 20px;
      background: var(--footer-bg);
      border-top: 1px solid var(--bg3);
      margin-top: auto;
      transition: all 0.3s ease;
    }
    
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    
    .footer-links a {
      color: var(--primary-dark);
      font-size: 11px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.3s;
    }
    
    .footer-links a:hover {
      color: var(--dark);
    }
    
    .footer-text {
      font-size: 10px;
      color: var(--text-light);
      transition: color 0.3s;
    }
    
    @media (max-width: 650px) {
      .map-container {
        height: 400px;
      }
      .map-tab {
        font-size: 11px;
        padding: 8px 10px;
      }
      .address-card {
        flex-wrap: wrap;
      }
    }
    
    @media (max-width: 380px) {
      .map-container {
        height: 350px;
      }
      .map-tab {
        font-size: 10px;
        gap: 3px;
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-right">
        <div class="header-logo">
          <img src="https://cdn.imgurl.ir/uploads/f57721_InShot_20260714_014548498.png" alt="لوگو">
        </div>
        <div>
          <div class="header-title">شهدای گمنام شورابیل</div>
          <div class="header-subtitle">سایت رسمی اطلاع رسانی و گزارش مراسمات</div>
        </div>
      </div>
      <div class="header-btns">
        <a href="../index.html" class="back-btn" title="بازگشت">
          <i class="fa-solid fa-arrow-right"></i>
        </a>
        <button class="theme-toggle" id="themeToggle" title="تغییر تم">
          <i class="fa-solid fa-moon"></i>
        </button>
      </div>
    </div>
  </header>

  <section class="main-container">
    
    <div class="page-title">
      <i class="fa-solid fa-location-dot"></i>
      نشانی ما
    </div>
    
    <div class="address-card">
      <div class="address-icon">
        <i class="fa-solid fa-map-pin"></i>
      </div>
      <div class="address-text">
        <h4>شهدای گمنام شورابیل</h4>
        <p>اردبیل، شورابیل</p>
      </div>
      <button class="copy-btn" onclick="copyAddress()">
        <i class="fa-solid fa-copy"></i>
        کپی آدرس
      </button>
    </div>
    
    <div class="map-tabs">
      <button class="map-tab active" onclick="switchMap('google')">
        <i class="fa-brands fa-google"></i>
        گوگل مپ
      </button>
      <button class="map-tab" onclick="switchMap('neshan')">
        <i class="fa-solid fa-map"></i>
        نشان
      </button>
      <button class="map-tab" onclick="switchMap('balad')">
        <i class="fa-solid fa-map-location-dot"></i>
        بلد
      </button>
    </div>
    
    <div class="map-container">
      <iframe 
        id="googleMap" 
        class="active"
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3180.6!2d48.2943!3d38.2174!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzjCsDEzJzAyLjYiTiA0OMKwMTcnMzkuNSJF!5e0!3m2!1sen!2s!4v1620000000000"
        allowfullscreen="" 
        loading="lazy" 
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
      
      <iframe 
        id="neshanMap"
        src="https://nshn.ir/sbChG1N5asY4"
        allowfullscreen="" 
        loading="lazy">
      </iframe>
      
      <iframe 
        id="baladMap"
        src="https://balad.ir/embed?p=2K6i1BBAyiOlEi"
        allowfullscreen="" 
        loading="lazy">
      </iframe>
    </div>

  </section>

  <footer class="footer">
    <div class="footer-links">
      <a href="Communication.html"><i class="fa-solid fa-phone"></i> ارتباط با ما</a>
      <a href="map.html"><i class="fa-solid fa-location-dot"></i> نشانی ما</a>
    </div>
    <p class="footer-text">خادمین شهدای گمنام شورابیل — کلیه حقوق محفوظ است</p>
  </footer>

  <script>
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('i');
    
    const savedTheme = localStorage.getItem('heyat-theme');
    if (savedTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      themeIcon.classList.replace('fa-moon', 'fa-sun');
    }
    
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      
      if (currentTheme === 'dark') {
        document.documentElement.removeAttribute('data-theme');
        themeIcon.classList.replace('fa-sun', 'fa-moon');
        localStorage.setItem('heyat-theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        themeIcon.classList.replace('fa-moon', 'fa-sun');
        localStorage.setItem('heyat-theme', 'dark');
      }
    });
    
    async function checkMuharram() {
      try {
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        const dateStr = `${year}-${month}-${day}`;
        
        const res = await fetch(`https://api.aladhan.com/v1/gToH/${dateStr}`);
        const data = await res.json();
        
        if (data.code === 200) {
          const hijriMonth = data.data.hijri.month.number;
          if (hijriMonth === 1) {
            document.documentElement.setAttribute('data-muharram', 'true');
          }
        }
      } catch (e) {
        console.log('بررسی ماه محرم با خطا مواجه شد');
      }
    }
    
    function switchMap(type) {
      document.querySelectorAll('.map-tab').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.map-container iframe').forEach(iframe => iframe.classList.remove('active'));
      
      document.getElementById(type + 'Map').classList.add('active');
      event.target.closest('.map-tab').classList.add('active');
    }
    
    function copyAddress() {
      const address = 'اردبیل، شورابیل، شهدای گمنام شورابیل';
      navigator.clipboard.writeText(address).then(() => {
        const btn = document.querySelector('.copy-btn');
        const originalHTML = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-check"></i> کپی شد';
        btn.style.background = '#10b981';
        btn.style.color = '#fff';
        
        setTimeout(() => {
          btn.innerHTML = originalHTML;
          btn.style.background = '';
          btn.style.color = '';
        }, 2000);
      });
    }
    
    function init() {
      checkMuharram();
    }
    
    init();
  </script>

</body>
</html>
