<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>شهدای گمنام شورابیل</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #f8fafc;
      --bg2: #f1f5f9;
      --bg3: #e2e8f0;
      --primary: #0d9488;
      --primary-dark: #0f766e;
      --primary-light: #5eead4;
      --primary-rgb: 13, 148, 136;
      --dark: #0f172a;
      --text: #334155;
      --text-light: #94a3b8;
      --white: #ffffff;
      --card-bg: #ffffff;
      --card-border: #e2e8f0;
      --shadow: 0 2px 12px rgba(0,0,0,0.04);
      --shadow-hover: 0 8px 24px rgba(0,0,0,0.08);
      --header-bg: #ffffff;
      --footer-bg: #ffffff;
      --overlay: rgba(13, 148, 136, 0.05);
      --logo-filter: none;
      --modal-bg: rgba(0,0,0,0.9);
    }
    
    [data-theme="dark"] {
      --bg: #0f172a;
      --bg2: #1e293b;
      --bg3: #334155;
      --primary: #14b8a6;
      --primary-dark: #0d9488;
      --primary-light: #5eead4;
      --primary-rgb: 20, 184, 166;
      --dark: #f1f5f9;
      --text: #cbd5e1;
      --text-light: #64748b;
      --white: #1e293b;
      --card-bg: #1e293b;
      --card-border: #334155;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
      --shadow-hover: 0 8px 24px rgba(0,0,0,0.5);
      --header-bg: #1e293b;
      --footer-bg: #1e293b;
      --overlay: rgba(20, 184, 166, 0.08);
      --logo-filter: brightness(0) invert(1);
    }
    
    [data-muharram="true"] {
      --primary: #dc2626;
      --primary-dark: #b91c1c;
      --primary-light: #fca5a5;
      --primary-rgb: 220, 38, 38;
      --overlay: rgba(220, 38, 38, 0.05);
    }
    
    [data-theme="dark"][data-muharram="true"] {
      --primary: #ef4444;
      --primary-dark: #dc2626;
      --primary-light: #fca5a5;
      --primary-rgb: 239, 68, 68;
      --overlay: rgba(239, 68, 68, 0.08);
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
    }
    
    .header {
      background: var(--header-bg);
      box-shadow: 0 1px 8px rgba(0,0,0,0.03);
      padding: 14px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--bg3);
      transition: all 0.3s ease;
    }
    
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      max-width: 1100px;
      margin: 0 auto;
    }
    
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .header-logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 12px rgba(var(--primary-rgb), 0.2);
      overflow: hidden;
      padding: 6px;
    }
    
    .header-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: var(--logo-filter);
    }
    
    .header-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--dark);
      transition: color 0.3s;
    }
    
    .header-subtitle {
      font-size: 10px;
      color: var(--text-light);
      transition: color 0.3s;
    }
    
    .header-btns {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .theme-toggle {
      background: var(--bg2);
      border: none;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      color: var(--text);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
    }
    
    .theme-toggle:hover {
      background: var(--primary);
      color: #fff;
      transform: rotate(15deg);
    }
    
    .main-container {
      flex: 1;
      max-width: 1100px;
      width: 100%;
      margin: 20px auto;
      padding: 0 12px;
    }
    
    .loader-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
    }
    
    .loader {
      width: 48px;
      height: 48px;
      border: 4px solid var(--bg3);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .announcements-section {
      margin-bottom: 24px;
    }
    
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.3s;
    }
    
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--bg3);
      transition: background 0.3s;
    }
    
    .announcement-item {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      transition: all 0.3s ease;
      cursor: pointer;
      display: flex;
      gap: 14px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    
    .announcement-item::before {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      width: 3px;
      height: 100%;
      background: linear-gradient(to bottom, var(--primary), var(--primary-dark));
    }
    
    .announcement-image {
      width: 90px;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      border-radius: 8px;
      background: var(--bg2);
      flex-shrink: 0;
    }
    
    .announcement-image.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: var(--primary);
      background: linear-gradient(135deg, rgba(var(--primary-rgb), 0.08), rgba(var(--primary-rgb), 0.03));
    }
    
    .announcement-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
    }
    
    .announcement-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--dark);
      transition: color 0.3s;
      line-height: 1.5;
    }
    
    .announcement-text {
      font-size: 11px;
      color: var(--text-light);
      line-height: 1.7;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }
    
    .announcement-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .announcement-date {
      font-size: 10px;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .announcement-tag {
      font-size: 10px;
      background: var(--overlay);
      color: var(--primary-dark);
      padding: 4px 10px;
      border-radius: 8px;
      white-space: nowrap;
      font-weight: 600;
    }
    
    .events-section {
      margin-bottom: 24px;
    }
    
    .search-box {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      background: var(--card-bg);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      margin-bottom: 12px;
      transition: all 0.3s ease;
    }
    
    .search-box:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.1);
    }
    
    .search-box::placeholder {
      color: var(--text-light);
    }
    
    .no-result {
      text-align: center;
      padding: 20px;
      color: var(--text-light);
      font-size: 13px;
      width: 100%;
      flex-shrink: 0;
    }
    
    .events-track {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 8px 0 12px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: var(--primary) var(--bg2);
    }
    
    .events-track::-webkit-scrollbar {
      height: 6px;
    }
    
    .events-track::-webkit-scrollbar-track {
      background: var(--bg2);
      border-radius: 3px;
    }
    
    .events-track::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 3px;
    }
    
    .event-card {
      min-width: 220px;
      max-width: 220px;
      background: var(--card-bg);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
      cursor: pointer;
      border: 1px solid var(--card-border);
      flex-shrink: 0;
    }
    
    .event-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
      border-color: var(--primary-light);
    }
    
    .event-card.today {
      border-color: var(--primary);
      animation: glowBorder 2s ease-in-out infinite alternate;
    }
    
    .event-card.today:hover {
      border-color: var(--primary);
    }
    
    @keyframes glowBorder {
      from { border-color: var(--primary); box-shadow: 0 0 8px rgba(var(--primary-rgb), 0.2); }
      to { border-color: var(--primary-light); box-shadow: 0 0 16px rgba(var(--primary-rgb), 0.4); }
    }
    
    .event-card.past {
      opacity: 0.5;
    }
    
    .event-card.past:hover {
      opacity: 0.8;
    }
    
    .event-image {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      background: var(--bg2);
    }
    
    .event-image.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: var(--primary);
    }
    
    .event-info {
      padding: 10px 12px;
    }
    
    .event-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 6px;
      line-height: 1.5;
      transition: color 0.3s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .event-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
    }
    
    .event-date {
      font-size: 9px;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 3px;
    }
    
    .event-location {
      font-size: 9px;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 3px;
    }
    
    .event-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    
    .event-tag {
      font-size: 9px;
      color: var(--primary-dark);
      background: var(--overlay);
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 600;
      display: inline-block;
    }
    
    .today-tag {
      font-size: 9px;
      background: var(--primary);
      color: #fff;
      padding: 3px 10px;
      border-radius: 10px;
      font-weight: 700;
      animation: pulse 1.5s ease-in-out infinite;
      display: inline-block;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .donation-section {
      margin-bottom: 24px;
    }
    
    .donation-banner {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      color: #fff;
      box-shadow: 0 4px 16px rgba(var(--primary-rgb), 0.3);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .donation-banner:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(var(--primary-rgb), 0.4);
    }
    
    .donation-icon {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    
    .donation-info h3 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 2px;
    }
    
    .donation-info p {
      font-size: 10px;
      opacity: 0.9;
    }
    
    .donation-arrow {
      font-size: 16px;
      flex-shrink: 0;
      margin-right: auto;
    }
    
    .gallery-section {
      margin-bottom: 24px;
    }
    
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    
    .gallery-card {
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--card-border);
      transition: all 0.3s ease;
      cursor: pointer;
      animation: fadeIn 0.4s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .gallery-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }
    
    .gallery-image {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: var(--bg2);
    }
    
    .gallery-image.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: var(--primary);
    }
    
    .gallery-info {
      padding: 8px 10px;
    }
    
    .gallery-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.3s;
    }
    
    .gallery-meta {
      font-size: 9px;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .image-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--modal-bg);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    
    .image-modal.active {
      display: flex;
    }
    
    .image-modal img {
      max-width: 90%;
      max-height: 80vh;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    
    .image-modal .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }
    
    .image-modal .modal-close:hover {
      background: rgba(255,255,255,0.2);
    }
    
    .image-modal .modal-info {
      color: #fff;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
    }
    
    .image-modal .modal-info h4 {
      font-size: 15px;
      margin-bottom: 4px;
    }
    
    .image-modal .modal-info p {
      font-size: 11px;
      opacity: 0.7;
    }
    
    .footer {
      text-align: center;
      padding: 20px;
      background: var(--footer-bg);
      border-top: 1px solid var(--bg3);
      position: sticky;
      bottom: 0;
      z-index: 50;
      transition: all 0.3s ease;
    }
    
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    
    .footer-links a {
      color: var(--primary-dark);
      font-size: 11px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.3s;
    }
    
    .footer-links a:hover {
      color: var(--dark);
    }
    
    .footer-text {
      font-size: 10px;
      color: var(--text-light);
      transition: color 0.3s;
    }
    
    @media (max-width: 900px) and (min-width: 651px) {
      .gallery-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    
    @media (max-width: 650px) {
      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }
      .header-title {
        font-size: 17px;
      }
      .announcement-image {
        width: 75px;
      }
      .announcement-title {
        font-size: 13px;
      }
      .announcement-text {
        font-size: 10px;
        -webkit-line-clamp: 2;
      }
    }
    
    @media (max-width: 380px) {
      .gallery-grid {
        gap: 6px;
      }
      .announcement-item {
        padding: 10px;
        gap: 10px;
      }
      .announcement-image {
        width: 65px;
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-right">
        <div class="header-logo">
          <img src="https://cdn.imgurl.ir/uploads/f57721_InShot_20260714_014548498.png" alt="لوگو">
        </div>
        <div>
          <div class="header-title">شهدای گمنام شورابیل</div>
          <div class="header-subtitle">سایت رسمی اطلاع رسانی و گزارش مراسمات</div>
        </div>
      </div>
      <div class="header-btns">
        <button class="theme-toggle" id="themeToggle" title="تغییر تم">
          <i class="fa-solid fa-moon"></i>
        </button>
      </div>
    </div>
  </header>

  <section class="main-container" id="mainContent">
    <div class="loader-wrapper">
      <div class="loader"></div>
    </div>
  </section>

  <div class="image-modal" id="imageModal">
    <button class="modal-close" onclick="closeModal()">
      <i class="fa-solid fa-times"></i>
    </button>
    <img src="" alt="" id="modalImage">
    <div class="modal-info">
      <h4 id="modalTitle"></h4>
      <p id="modalMeta"></p>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-links">
      <a href="list/Communication.html"><i class="fa-solid fa-phone"></i> ارتباط با ما</a>
      <a href="list/map.html"><i class="fa-solid fa-location-dot"></i> نشانی ما</a>
    </div>
    <p class="footer-text">خادمین شهدای گمنام شورابیل — کلیه حقوق محفوظ است</p>
  </footer>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwS7_upFNhRFx_yc_EDinq__A-JeChjVABVrtuE8OuCnLciUaw0KqO9uVzdYdRQJxea/exec';
    
    const themeToggle = document.getElementById('themeToggle');
    const icon = themeToggle.querySelector('i');
    
    const savedTheme = localStorage.getItem('heyat-theme');
    if (savedTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      icon.classList.replace('fa-moon', 'fa-sun');
    }
    
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      
      if (currentTheme === 'dark') {
        document.documentElement.removeAttribute('data-theme');
        icon.classList.replace('fa-sun', 'fa-moon');
        localStorage.setItem('heyat-theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        icon.classList.replace('fa-moon', 'fa-sun');
        localStorage.setItem('heyat-theme', 'dark');
      }
    });
    
    async function checkMuharram() {
      try {
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        const dateStr = `${year}-${month}-${day}`;
        
        const res = await fetch(`https://api.aladhan.com/v1/gToH/${dateStr}`);
        const data = await res.json();
        
        if (data.code === 200) {
          const hijriMonth = data.data.hijri.month.number;
          if (hijriMonth === 1) {
            document.documentElement.setAttribute('data-muharram', 'true');
          }
        }
      } catch (e) {
        console.log('بررسی ماه محرم با خطا مواجه شد');
      }
    }
    
    function openAnnouncement(id) {
      localStorage.setItem('selectedAnnouncementId', id);
      window.location.href = 'list/Announcements.html';
    }
    
    function openEvent(id) {
      localStorage.setItem('selectedEventId', id);
      window.location.href = 'list/Events.html';
    }
    
    function openModal(imageSrc, title, meta) {
      const modal = document.getElementById('imageModal');
      document.getElementById('modalImage').src = imageSrc;
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalMeta').textContent = meta;
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    
    function closeModal() {
      const modal = document.getElementById('imageModal');
      modal.classList.remove('active');
      document.body.style.overflow = '';
    }
    
    document.getElementById('imageModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeModal();
      }
    });
    
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeModal();
      }
    });
    
    function renderGalleryCard(item) {
      const eventDate = new Date(item.date);
      const dateStr = eventDate.toLocaleDateString('fa-IR');
      
      const safeTitle = item.title.replace(/'/g, "\\'").replace(/"/g, '&quot;');
      const safeLocation = (item.location || 'مشخص نشده').replace(/'/g, "\\'").replace(/"/g, '&quot;');
      
      return `
        <div class="gallery-card" onclick="openModal('${item.image}', '${safeTitle}', '${dateStr} — ${safeLocation}')" data-title="${item.title}" data-date="${dateStr}" data-location="${item.location || ''}">
          <img src="${item.image}" class="gallery-image" alt="${item.title}" loading="lazy">
          <div class="gallery-info">
            <div class="gallery-title">${item.title}</div>
            <div class="gallery-meta">
              <i class="fa-solid fa-clock"></i> ${dateStr}
            </div>
          </div>
        </div>
      `;
    }
    
    function lazyLoadGallery(allItems, startIndex, batchSize, delay, grid) {
      let currentIndex = startIndex;
      
      function addBatch() {
        const batch = allItems.slice(currentIndex, currentIndex + batchSize);
        
        if (batch.length === 0) return;
        
        batch.forEach(item => {
          grid.insertAdjacentHTML('beforeend', renderGalleryCard(item));
        });
        
        currentIndex += batchSize;
        
        if (currentIndex < allItems.length) {
          setTimeout(addBatch, delay);
        }
      }
      
      setTimeout(addBatch, delay);
    }
    
    async function loadAllData() {
      const container = document.getElementById('mainContent');
      
      try {
        const [announcementsRes, eventsRes] = await Promise.all([
          fetch(API_URL + '?action=getActiveAnnouncements'),
          fetch(API_URL + '?action=getEvents')
        ]);
        
        const announcementsData = await announcementsRes.json();
        const eventsData = await eventsRes.json();
        
        let announcementsHTML = '';
        let eventsHTML = '';
        let donationHTML = '';
        let galleryHTML = '';
        
        if (announcementsData.success && announcementsData.data.length > 0) {
          announcementsHTML = `
            <div class="announcements-section">
              <div class="section-title">
                <i class="fa-solid fa-bullhorn"></i>
                اطلاعیه‌ها
              </div>
              ${announcementsData.data.map(item => {
                const annDate = item.date ? new Date(item.date) : null;
                const dateStr = annDate ? annDate.toLocaleDateString('fa-IR') : '';
                
                const imageHTML = item.image ? 
                  `<img src="${item.image}" class="announcement-image" alt="${item.title}">` :
                  `<div class="announcement-image placeholder"><i class="fa-solid fa-bullhorn"></i></div>`;
                
                return `
                  <div class="announcement-item" onclick="openAnnouncement('${item.id}')">
                    ${imageHTML}
                    <div class="announcement-body">
                      <div class="announcement-title">${item.title}</div>
                      ${item.content ? `<div class="announcement-text">${item.content}</div>` : ''}
                      <div class="announcement-footer">
                        ${dateStr ? `<span class="announcement-date"><i class="fa-solid fa-clock"></i> ${dateStr}</span>` : ''}
                        ${item.tag ? `<span class="announcement-tag">${item.tag}</span>` : ''}
                      </div>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          `;
        } else {
          announcementsHTML = `
            <div class="announcements-section">
              <div class="section-title">
                <i class="fa-solid fa-bullhorn"></i>
                اطلاعیه‌ها
              </div>
              <div class="announcement-item">
                <div class="announcement-image placeholder"><i class="fa-solid fa-circle-info"></i></div>
                <div class="announcement-body">
                  <div class="announcement-title">اطلاعیه‌ای برای نمایش وجود ندارد</div>
                </div>
              </div>
            </div>
          `;
        }
        
        donationHTML = `
          <div class="donation-section">
            <div class="donation-banner" onclick="window.location.href='list/donations.html'">
              <div class="donation-icon">
                <i class="fa-solid fa-hand-holding-heart"></i>
              </div>
              <div class="donation-info">
                <h3>منتظر کمک‌های نقدی شما هستیم</h3>
                <p>با کمک های خود، ما را در برگزاری مراسم‌ها یاری کنید.</p>
              </div>
              <div class="donation-arrow">
                <i class="fa-solid fa-chevron-left"></i>
              </div>
            </div>
          </div>
        `;
        
        if (eventsData.success && eventsData.data.length > 0) {
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          
          const upcomingEvents = eventsData.data.filter(event => new Date(event.date) >= today);
          const pastEvents = eventsData.data.filter(event => new Date(event.date) < today);
          
          upcomingEvents.sort((a, b) => new Date(a.date) - new Date(b.date));
          pastEvents.sort((a, b) => new Date(b.date) - new Date(a.date));
          
          const allEvents = [...upcomingEvents, ...pastEvents];
          
          if (allEvents.length > 0) {
            eventsHTML = `
              <div class="events-section">
                <div class="section-title">
                  <i class="fa-solid fa-calendar-check"></i>
                  مراسمات
                </div>
                <input type="text" class="search-box" id="eventSearch" placeholder="جستجو در مراسمات...">
                <div class="events-track" id="eventsTrack">
                  ${allEvents.map(event => {
                    const eventDate = new Date(event.date);
                    const isPast = eventDate < today;
                    const isToday = eventDate.toDateString() === today.toDateString();
                    const dateStr = eventDate.toLocaleDateString('fa-IR');
                    
                    return `
                      <div class="event-card ${isPast ? 'past' : ''} ${isToday ? 'today' : ''}" onclick="openEvent('${event.id}')" data-title="${event.title}" data-description="${event.description || ''}" data-tag="${event.tag || ''}" data-location="${event.location || ''}" data-date="${dateStr}">
                        ${event.image ? 
                          `<img src="${event.image}" class="event-image" alt="${event.title}">` : 
                          `<div class="event-image placeholder"><i class="fa-solid fa-mosque"></i></div>`
                        }
                        <div class="event-info">
                          <div class="event-title">${event.title}</div>
                          <div class="event-meta">
                            <span class="event-date"><i class="fa-solid fa-clock"></i> ${dateStr}</span>
                            <span class="event-location"><i class="fa-solid fa-location-dot"></i> ${event.location || 'مشخص نشده'}</span>
                          </div>
                          <div class="event-tags">
                            ${isToday ? '<span class="today-tag"><i class="fa-solid fa-calendar-check"></i> امروز</span>' : ''}
                            <span class="event-tag">${event.tag || 'مراسم'}</span>
                          </div>
                        </div>
                      </div>
                    `;
                  }).join('')}
                </div>
              </div>
            `;
          } else {
            eventsHTML = `
              <div class="events-section">
                <div class="section-title">
                  <i class="fa-solid fa-calendar-check"></i>
                  مراسمات
                </div>
                <div class="events-track">
                  <div class="event-card">
                    <div class="event-image placeholder"><i class="fa-solid fa-calendar-xmark"></i></div>
                    <div class="event-info" style="text-align: center;">
                      <div class="event-title">مراسمی ثبت نشده است</div>
                    </div>
                  </div>
                </div>
              </div>
            `;
          }
          
          const archiveItems = [];
          
          for (const event of eventsData.data) {
            try {
              const archiveRes = await fetch(API_URL + '?action=getArchiveByEventId', {
                method: 'POST',
                body: JSON.stringify({ eventId: event.id })
              });
              const archiveData = await archiveRes.json();
              
              if (archiveData.success && archiveData.data.images && archiveData.data.images.length > 0) {
                archiveData.data.images.forEach(img => {
                  archiveItems.push({
                    eventId: event.id,
                    title: event.title,
                    date: event.date,
                    location: event.location,
                    image: img
                  });
                });
              }
            } catch (e) {
              continue;
            }
          }
          
          if (archiveItems.length > 0) {
            const initialCount = Math.min(15, archiveItems.length);
            const initialItems = archiveItems.slice(0, initialCount);
            const remainingItems = archiveItems.slice(initialCount);
            
            galleryHTML = `
              <div class="gallery-section">
                <div class="section-title">
                  <i class="fa-solid fa-images"></i>
                  تصاویر
                </div>
                <input type="text" class="search-box" id="gallerySearch" placeholder="جستجو در تصاویر...">
                <div class="gallery-grid" id="galleryGrid">
                  ${initialItems.map(item => renderGalleryCard(item)).join('')}
                </div>
              </div>
            `;
            
            container.innerHTML = announcementsHTML + eventsHTML + donationHTML + galleryHTML;
            
            if (remainingItems.length > 0) {
              const grid = document.getElementById('galleryGrid');
              lazyLoadGallery(remainingItems, 0, 5, 300, grid);
            }
          } else {
            galleryHTML = `
              <div class="gallery-section">
                <div class="section-title">
                  <i class="fa-solid fa-images"></i>
                  تصاویر
                </div>
                <div class="gallery-grid">
                  <div class="gallery-card" style="grid-column: 1/-1;">
                    <div class="gallery-image placeholder"><i class="fa-solid fa-image"></i></div>
                    <div class="gallery-info" style="text-align: center;">
                      <div class="gallery-title">تصویری آرشیو نشده</div>
                    </div>
                  </div>
                </div>
              </div>
            `;
            container.innerHTML = announcementsHTML + eventsHTML + donationHTML + galleryHTML;
          }
        } else {
          eventsHTML = `
            <div class="events-section">
              <div class="section-title">
                <i class="fa-solid fa-calendar-check"></i>
                مراسمات
              </div>
              <div class="events-track">
                <div class="event-card">
                  <div class="event-image placeholder"><i class="fa-solid fa-calendar-xmark"></i></div>
                  <div class="event-info" style="text-align: center;">
                    <div class="event-title">مراسمی ثبت نشده است</div>
                  </div>
                </div>
              </div>
            </div>
          `;
          
          galleryHTML = `
            <div class="gallery-section">
              <div class="section-title">
                <i class="fa-solid fa-images"></i>
                تصاویر
              </div>
              <div class="gallery-grid">
                <div class="gallery-card" style="grid-column: 1/-1;">
                  <div class="gallery-image placeholder"><i class="fa-solid fa-image"></i></div>
                  <div class="gallery-info" style="text-align: center;">
                    <div class="gallery-title">تصویری یافت نشد</div>
                  </div>
                </div>
              </div>
            </div>
          `;
          
          container.innerHTML = announcementsHTML + eventsHTML + donationHTML + galleryHTML;
        }
        
        const eventSearch = document.getElementById('eventSearch');
        if (eventSearch) {
          eventSearch.addEventListener('input', function() {
            const query = this.value.toLowerCase().trim();
            const track = document.getElementById('eventsTrack');
            const cards = track.querySelectorAll('.event-card');
            let hasVisible = false;
            
            cards.forEach(card => {
              const title = (card.dataset.title || '').toLowerCase();
              const description = (card.dataset.description || '').toLowerCase();
              const tag = (card.dataset.tag || '').toLowerCase();
              const location = (card.dataset.location || '').toLowerCase();
              const date = (card.dataset.date || '').toLowerCase();
              
              if (query === '' || title.includes(query) || description.includes(query) || tag.includes(query) || location.includes(query) || date.includes(query)) {
                card.style.display = '';
                hasVisible = true;
              } else {
                card.style.display = 'none';
              }
            });
            
            let noResult = track.querySelector('.no-result');
            if (!hasVisible) {
              if (!noResult) {
                noResult = document.createElement('div');
                noResult.className = 'no-result';
                noResult.textContent = 'نتیجه‌ای یافت نشد';
                track.appendChild(noResult);
              }
            } else {
              if (noResult) noResult.remove();
            }
          });
        }
        
        const gallerySearch = document.getElementById('gallerySearch');
        if (gallerySearch) {
          gallerySearch.addEventListener('input', function() {
            const query = this.value.toLowerCase().trim();
            const grid = document.getElementById('galleryGrid');
            const cards = grid.querySelectorAll('.gallery-card');
            let hasVisible = false;
            
            cards.forEach(card => {
              const title = (card.dataset.title || '').toLowerCase();
              const date = (card.dataset.date || '').toLowerCase();
              const location = (card.dataset.location || '').toLowerCase();
              
              if (query === '' || title.includes(query) || date.includes(query) || location.includes(query)) {
                card.style.display = '';
                hasVisible = true;
              } else {
                card.style.display = 'none';
              }
            });
            
            let noResult = grid.querySelector('.no-result');
            if (!hasVisible) {
              if (!noResult) {
                noResult = document.createElement('div');
                noResult.className = 'no-result';
                noResult.textContent = 'نتیجه‌ای یافت نشد';
                noResult.style.gridColumn = '1 / -1';
                grid.appendChild(noResult);
              }
            } else {
              if (noResult) noResult.remove();
            }
          });
        }
        
      } catch (e) {
        container.innerHTML = `
          <div class="loader-wrapper">
            <div style="text-align: center;">
              <i class="fa-solid fa-circle-exclamation" style="font-size: 48px; color: var(--text-light); margin-bottom: 12px;"></i>
              <p style="color: var(--text-light);">خطا در دریافت اطلاعات</p>
              <button onclick="loadAllData()" style="margin-top: 12px; padding: 8px 20px; background: var(--primary); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 13px;">
                <i class="fa-solid fa-rotate-right"></i> تلاش مجدد
              </button>
            </div>
          </div>
        `;
      }
    }
    
    function init() {
      checkMuharram();
      loadAllData();
    }
    
    init();
  </script>

</body>
</html>
