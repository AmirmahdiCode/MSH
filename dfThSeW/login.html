<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ورود مدیریت | شهدای گمنام شورابیل</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #f8fafc;
      --primary: #0d9488;
      --primary-dark: #0f766e;
      --primary-rgb: 13, 148, 136;
      --dark: #0f172a;
      --text: #334155;
      --text-light: #94a3b8;
      --white: #ffffff;
      --card-bg: #ffffff;
      --card-border: #e2e8f0;
      --shadow: 0 2px 12px rgba(0,0,0,0.04);
      --input-bg: #f8fafc;
      --input-border: #e2e8f0;
    }
    
    [data-theme="dark"] {
      --bg: #0f172a;
      --primary: #14b8a6;
      --primary-dark: #0d9488;
      --primary-rgb: 20, 184, 166;
      --dark: #f1f5f9;
      --text: #cbd5e1;
      --text-light: #64748b;
      --white: #1e293b;
      --card-bg: #1e293b;
      --card-border: #334155;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
      --input-bg: #0f172a;
      --input-border: #334155;
    }
    
    [data-muharram="true"] {
      --primary: #dc2626;
      --primary-dark: #b91c1c;
      --primary-rgb: 220, 38, 38;
    }
    
    [data-theme="dark"][data-muharram="true"] {
      --primary: #ef4444;
      --primary-dark: #dc2626;
      --primary-rgb: 239, 68, 68;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      padding: 20px;
    }
    
    .login-container {
      width: 100%;
      max-width: 420px;
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 28px;
    }
    
    .login-logo {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 4px 20px rgba(var(--primary-rgb), 0.3);
      overflow: hidden;
      padding: 10px;
    }
    
    .login-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
    .login-header h2 {
      font-size: 22px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 4px;
      transition: color 0.3s;
    }
    
    .login-header p {
      font-size: 12px;
      color: var(--text-light);
    }
    
    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: var(--shadow);
    }
    
    .form-group {
      margin-bottom: 18px;
    }
    
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      transition: color 0.3s;
    }
    
    .form-group label i {
      color: var(--primary);
      margin-left: 4px;
      width: 16px;
      text-align: center;
    }
    
    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--input-border);
      border-radius: 10px;
      background: var(--input-bg);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      transition: all 0.3s ease;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.1);
    }
    
    .form-input::placeholder {
      color: var(--text-light);
    }
    
    .password-wrapper {
      position: relative;
    }
    
    .password-wrapper .form-input {
      padding-left: 44px;
    }
    
    .toggle-password {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 44px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-light);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.3s;
    }
    
    .toggle-password:hover {
      color: var(--primary);
    }
    
    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 12px rgba(var(--primary-rgb), 0.3);
    }
    
    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(var(--primary-rgb), 0.4);
    }
    
    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .error-message {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 10px 14px;
      color: #dc2626;
      font-size: 11px;
      margin-bottom: 16px;
      display: none;
      text-align: center;
    }
    
    .error-message.show {
      display: block;
    }
    
    .theme-toggle {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      color: var(--text);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    
    .theme-toggle:hover {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <button class="theme-toggle" id="themeToggle" title="تغییر تم">
    <i class="fa-solid fa-moon"></i>
  </button>

  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">
        <img src="https://cdn.imgurl.ir/uploads/f57721_InShot_20260714_014548498.png" alt="لوگو">
      </div>
      <h2>پنل مدیریت</h2>
      <p>شهدای گمنام شورابیل</p>
    </div>
    
    <div class="login-card">
      <div class="error-message" id="errorMessage"></div>
      
      <div class="form-group">
        <label><i class="fa-solid fa-user"></i> نام کاربری</label>
        <input type="text" class="form-input" id="username" placeholder="نام کاربری خود را وارد کنید" autocomplete="username">
      </div>
      
      <div class="form-group">
        <label><i class="fa-solid fa-lock"></i> رمز عبور</label>
        <div class="password-wrapper">
          <input type="password" class="form-input" id="password" placeholder="رمز عبور خود را وارد کنید" autocomplete="current-password">
          <button type="button" class="toggle-password" id="togglePassword">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
      </div>
      
      <button class="login-btn" id="loginBtn">
        <span class="spinner" id="spinner"></span>
        <span id="btnText"><i class="fa-solid fa-arrow-left-to-line"></i> ورود به پنل</span>
      </button>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxPKAkYCaaG2xIVDUBARVQwOhKRwRb4b1J2723Lc-jYYRdRKd5aSKiuS0i0Hl-SJPep/exec';
    const SESSION_DURATION = 30 * 60 * 1000;
    
    function checkSession() {
      const sessionData = localStorage.getItem('admin_session');
      if (!sessionData) return false;
      
      try {
        const session = JSON.parse(sessionData);
        if (Date.now() - session.timestamp < SESSION_DURATION) {
          const sessionToken = localStorage.getItem('session_token');
          if (sessionToken) {
            window.location.href = 'dashboard.html';
            return true;
          }
        } else {
          localStorage.removeItem('admin_session');
          localStorage.removeItem('session_token');
        }
      } catch (e) {
        localStorage.removeItem('admin_session');
        localStorage.removeItem('session_token');
      }
      return false;
    }
    
    checkSession();
    
    async function getClientIP() {
      try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        return data.ip;
      } catch (e) {
        return 'unknown';
      }
    }
    
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('i');
    
    const savedTheme = localStorage.getItem('heyat-theme');
    if (savedTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      themeIcon.classList.replace('fa-moon', 'fa-sun');
    }
    
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      
      if (currentTheme === 'dark') {
        document.documentElement.removeAttribute('data-theme');
        themeIcon.classList.replace('fa-sun', 'fa-moon');
        localStorage.setItem('heyat-theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        themeIcon.classList.replace('fa-moon', 'fa-sun');
        localStorage.setItem('heyat-theme', 'dark');
      }
    });
    
    async function checkMuharram() {
      try {
        const today = new Date();
        const day = String(today.getDate()).padStart(2, '0');
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const year = today.getFullYear();
        
        const res = await fetch(`https://api.aladhan.com/v1/gToH/${day}-${month}-${year}`);
        const data = await res.json();
        
        if (data.code === 200) {
          const hijriMonth = data.data.hijri.month.number;
          if (hijriMonth === 1) {
            document.documentElement.setAttribute('data-muharram', 'true');
          }
        }
      } catch (e) {
        console.log('بررسی ماه محرم با خطا مواجه شد');
      }
    }
    
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    
    togglePassword.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      togglePassword.querySelector('i').className = isPassword ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
    });
    
    const loginBtn = document.getElementById('loginBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const errorMessage = document.getElementById('errorMessage');
    const usernameInput = document.getElementById('username');
    
    async function login() {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      
      if (!username || !password) {
        showError('لطفاً نام کاربری و رمز عبور را وارد کنید');
        return;
      }
      
      loginBtn.disabled = true;
      spinner.style.display = 'block';
      btnText.innerHTML = 'در حال ورود...';
      errorMessage.classList.remove('show');
      
      try {
        const ip = await getClientIP();
        
        const res = await fetch(API_URL + '?action=login', {
          method: 'POST',
          body: JSON.stringify({ username, password, ip })
        });
        
        const data = await res.json();
        
        if (data.success) {
          const sessionData = {
            admin: {
              id: data.data.id,
              name: data.data.name,
              username: data.data.username,
              role: data.data.role
            },
            timestamp: Date.now()
          };
          localStorage.setItem('admin_session', JSON.stringify(sessionData));
          localStorage.setItem('session_token', data.data.sessionToken);
          window.location.href = 'dashboard.html';
        } else {
          showError(data.message || 'نام کاربری یا رمز عبور اشتباه است');
        }
      } catch (e) {
        showError('خطا در ارتباط با سرور');
      } finally {
        loginBtn.disabled = false;
        spinner.style.display = 'none';
        btnText.innerHTML = '<i class="fa-solid fa-arrow-left-to-line"></i> ورود به پنل';
      }
    }
    
    function showError(msg) {
      errorMessage.textContent = msg;
      errorMessage.classList.add('show');
      setTimeout(() => {
        errorMessage.classList.remove('show');
      }, 5000);
    }
    
    loginBtn.addEventListener('click', login);
    
    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') login();
    });
    
    usernameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') passwordInput.focus();
    });
    
    checkMuharram();
    usernameInput.focus();
  </script>

</body>
</html>
