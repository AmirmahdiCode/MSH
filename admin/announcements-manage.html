<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مدیریت اطلاعیه‌ها | شهدای گمنام شورابیل</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #f8fafc;
      --bg2: #f1f5f9;
      --bg3: #e2e8f0;
      --primary: #0d9488;
      --primary-dark: #0f766e;
      --primary-light: #5eead4;
      --primary-rgb: 13, 148, 136;
      --dark: #0f172a;
      --text: #334155;
      --text-light: #94a3b8;
      --white: #ffffff;
      --card-bg: #ffffff;
      --card-border: #e2e8f0;
      --shadow: 0 2px 12px rgba(0,0,0,0.04);
      --shadow-hover: 0 8px 24px rgba(0,0,0,0.08);
      --header-bg: #ffffff;
      --logo-filter: none;
      --danger: #dc2626;
      --danger-light: #fef2f2;
      --success: #10b981;
      --success-light: #ecfdf5;
      --info: #3b82f6;
      --purple: #8b5cf6;
    }
    
    [data-theme="dark"] {
      --bg: #0f172a;
      --bg2: #1e293b;
      --bg3: #334155;
      --primary: #14b8a6;
      --primary-dark: #0d9488;
      --primary-light: #5eead4;
      --primary-rgb: 20, 184, 166;
      --dark: #f1f5f9;
      --text: #cbd5e1;
      --text-light: #64748b;
      --white: #1e293b;
      --card-bg: #1e293b;
      --card-border: #334155;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
      --shadow-hover: 0 8px 24px rgba(0,0,0,0.5);
      --header-bg: #1e293b;
      --logo-filter: brightness(0) invert(1);
      --danger-light: #2e1a1a;
      --success-light: #1a2e2b;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: all 0.3s ease;
    }
    
    .header {
      background: var(--header-bg);
      box-shadow: 0 1px 8px rgba(0,0,0,0.03);
      padding: 14px 20px;
      border-bottom: 1px solid var(--bg3);
      transition: all 0.3s ease;
    }
    
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      max-width: 1100px;
      margin: 0 auto;
    }
    
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .header-logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 12px rgba(var(--primary-rgb), 0.2);
      overflow: hidden;
      padding: 6px;
    }
    
    .header-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: var(--logo-filter);
    }
    
    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      transition: color 0.3s;
    }
    
    .header-btns {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .back-btn {
      background: var(--bg2);
      border: none;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      color: var(--text);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      text-decoration: none;
    }
    
    .back-btn:hover {
      background: var(--primary);
      color: #fff;
    }
    
    .theme-toggle {
      background: var(--bg2);
      border: none;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      color: var(--text);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
    }
    
    .theme-toggle:hover {
      background: var(--primary);
      color: #fff;
      transform: rotate(15deg);
    }
    
    .logout-btn {
      background: var(--danger-light);
      border: 1px solid #fecaca;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      color: var(--danger);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: inherit;
    }
    
    .logout-btn:hover {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
    }
    
    .main-container {
      max-width: 1000px;
      width: 100%;
      margin: 24px auto;
      padding: 0 12px;
    }
    
    .page-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .add-btn {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.3s ease;
    }
    
    .add-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(var(--primary-rgb), 0.3);
    }
    
    .announcements-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .announcement-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }
    
    .announcement-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      flex-shrink: 0;
    }
    
    .announcement-info {
      flex: 1;
      min-width: 0;
    }
    
    .announcement-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 4px;
    }
    
    .announcement-meta {
      font-size: 10px;
      color: var(--text-light);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .announcement-meta span {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    
    .status-badge {
      font-size: 9px;
      padding: 3px 8px;
      border-radius: 6px;
      font-weight: 600;
    }
    
    .status-badge.active {
      background: var(--success-light);
      color: var(--success);
    }
    
    .status-badge.inactive {
      background: var(--danger-light);
      color: var(--danger);
    }
    
    .announcement-actions {
      display: flex;
      gap: 6px;
    }
    
    .action-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      background: var(--bg2);
      color: var(--text);
    }
    
    .action-btn:hover {
      background: var(--primary);
      color: #fff;
    }
    
    .action-btn.delete:hover {
      background: var(--danger);
      color: #fff;
    }
    
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      padding: 20px;
    }
    
    .modal-overlay.active {
      display: flex;
    }
    
    .modal {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .modal h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 16px;
    }
    
    .form-group {
      margin-bottom: 14px;
    }
    
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    
    .form-group label .hint {
      font-weight: 400;
      color: var(--text-light);
      font-size: 9px;
    }
    
    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      transition: all 0.3s ease;
    }
    
    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }
    
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.1);
    }
    
    .image-input-row {
      display: flex;
      gap: 8px;
    }
    
    .image-input-row .form-input {
      flex: 1;
    }
    
    .upload-btn {
      width: 42px;
      height: 42px;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      text-decoration: none;
    }
    
    .upload-btn.drive-upload {
      background: var(--info);
    }
    
    .upload-btn.drive-upload:hover {
      background: #2563eb;
    }
    
    .upload-btn.web-upload {
      background: var(--purple);
    }
    
    .upload-btn.web-upload:hover {
      background: #7c3aed;
    }
    
    .upload-btn input[type="file"] {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }
    
    .upload-btn.loading {
      pointer-events: none;
      opacity: 0.7;
    }
    
    .image-preview {
      width: 100%;
      max-width: 200px;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      border-radius: 8px;
      margin-top: 8px;
      display: none;
      background: var(--bg2);
    }
    
    .image-preview.show {
      display: block;
    }
    
    .modal-btns {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 20px;
    }
    
    .btn-cancel {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }
    
    .btn-submit {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
    }
    
    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .error-text {
      color: var(--danger);
      font-size: 10px;
      margin-top: 4px;
      display: none;
    }
    
    .error-text.show {
      display: block;
    }
    
    @media (max-width: 650px) {
      .announcement-card {
        flex-wrap: wrap;
        gap: 10px;
      }
      .announcement-actions {
        width: 100%;
        justify-content: flex-end;
      }
      .image-input-row {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-right">
        <div class="header-logo">
          <img src="https://cdn.imgurl.ir/uploads/f57721_InShot_20260714_014548498.png" alt="لوگو">
        </div>
        <div>
          <div class="header-title">مدیریت اطلاعیه‌ها</div>
        </div>
      </div>
      <div class="header-btns">
        <a href="dashboard.html" class="back-btn" title="بازگشت">
          <i class="fa-solid fa-arrow-right"></i>
        </a>
        <button class="theme-toggle" id="themeToggle" title="تغییر تم">
          <i class="fa-solid fa-moon"></i>
        </button>
        <button class="logout-btn" id="logoutBtn">
          <i class="fa-solid fa-right-from-bracket"></i>
          خروج
        </button>
      </div>
    </div>
  </header>

  <section class="main-container">
    <div class="page-title">
      <i class="fa-solid fa-bullhorn"></i>
      لیست اطلاعیه‌ها
      <button class="add-btn" id="addAnnouncementBtn">
        <i class="fa-solid fa-plus"></i>
        افزودن اطلاعیه
      </button>
    </div>
    
    <div class="announcements-list" id="announcementsList">
      <div style="text-align: center; padding: 32px; color: var(--text-light);">
        <i class="fa-solid fa-spinner fa-pulse"></i>
        <p style="margin-top: 8px; font-size: 12px;">در حال بارگذاری...</p>
      </div>
    </div>
  </section>

  <div class="modal-overlay" id="announcementModal">
    <div class="modal">
      <h3 id="modalTitle"><i class="fa-solid fa-plus"></i> افزودن اطلاعیه جدید</h3>
      <input type="hidden" id="editAnnouncementId">
      <div class="form-group">
        <label>عنوان</label>
        <input type="text" class="form-input" id="annTitle" placeholder="عنوان اطلاعیه">
      </div>
      <div class="form-group">
        <label>تصویر اطلاعیه <span class="hint">(لینک مستقیم وارد کنید یا آپلود نمایید)</span></label>
        <div class="image-input-row">
          <input type="url" class="form-input" id="annImage" placeholder="لینک تصویر را وارد کنید...">
          <button type="button" class="upload-btn drive-upload" id="uploadDriveBtn" title="آپلود در گوگل درایو">
            <i class="fa-brands fa-google-drive"></i>
            <input type="file" accept="image/*" id="driveFileInput">
          </button>
          <a href="https://imgurl.ir" target="_blank" class="upload-btn web-upload" title="آپلود در imgurl">
            <i class="fa-solid fa-cloud-arrow-up"></i>
          </a>
        </div>
        <img src="" class="image-preview" id="imagePreview" alt="پیش‌نمایش">
      </div>
      <div class="form-group">
        <label>متن اطلاعیه</label>
        <textarea class="form-textarea" id="annContent" placeholder="متن اطلاعیه..."></textarea>
      </div>
      <div class="form-group">
        <label>تگ</label>
        <input type="text" class="form-input" id="annTag" placeholder="مثلاً: فوری، خیریه، متفرقه">
      </div>
      <div class="form-group">
        <label>تاریخ</label>
        <input type="date" class="form-input" id="annDate">
      </div>
      <div class="form-group">
        <label>وضعیت</label>
        <select class="form-select" id="annStatus">
          <option value="فعال">فعال</option>
          <option value="غیرفعال">غیرفعال</option>
        </select>
      </div>
      <div class="error-text" id="annError"></div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeAnnModal()">انصراف</button>
        <button class="btn-submit" id="submitAnn">ذخیره</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <h3><i class="fa-solid fa-triangle-exclamation" style="color: var(--danger);"></i> حذف اطلاعیه</h3>
      <p style="font-size: 13px; color: var(--text); margin-bottom: 16px;">آیا از حذف این اطلاعیه اطمینان دارید؟</p>
      <input type="hidden" id="deleteAnnId">
      <div class="error-text" id="deleteError"></div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeDeleteModal()">انصراف</button>
        <button class="btn-submit" id="submitDelete" style="background: var(--danger);">حذف</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbz74XMEmnI1JH7uQcBGUWLnPGxMxKwX2HJmpRkbcAaNLV3m7lJ2AFKdZbIZFP9s0kfg/exec';
    const SESSION_DURATION = 30 * 60 * 1000;
    
    function checkSession() {
      const sessionData = localStorage.getItem('admin_session');
      if (!sessionData) {
        window.location.href = 'login.html';
        return null;
      }
      
      try {
        const session = JSON.parse(sessionData);
        if (Date.now() - session.timestamp > SESSION_DURATION) {
          localStorage.removeItem('admin_session');
          window.location.href = 'login.html';
          return null;
        }
        return session;
      } catch (e) {
        localStorage.removeItem('admin_session');
        window.location.href = 'login.html';
        return null;
      }
    }
    
    const session = checkSession();
    if (!session) throw new Error('Session expired');
    
    const admin = session.admin;
    
    if (admin.role !== 'مالک' && admin.role !== 'ادمین ویژه' && admin.role !== 'ادمین') {
      window.location.href = 'dashboard.html';
    }
    
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('i');
    
    const savedTheme = localStorage.getItem('heyat-theme');
    if (savedTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      themeIcon.classList.replace('fa-moon', 'fa-sun');
    }
    
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      
      if (currentTheme === 'dark') {
        document.documentElement.removeAttribute('data-theme');
        themeIcon.classList.replace('fa-sun', 'fa-moon');
        localStorage.setItem('heyat-theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        themeIcon.classList.replace('fa-moon', 'fa-sun');
        localStorage.setItem('heyat-theme', 'dark');
      }
    });
    
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('admin_session');
      window.location.href = 'login.html';
    });
    
    let allAnnouncements = [];
    
    document.getElementById('driveFileInput').addEventListener('change', async function() {
      const file = this.files[0];
      if (!file) return;
      
      const uploadBtn = document.getElementById('uploadDriveBtn');
      uploadBtn.classList.add('loading');
      const originalHTML = uploadBtn.innerHTML;
      uploadBtn.innerHTML = '<i class="fa-solid fa-spinner fa-pulse"></i>';
      
      try {
        const reader = new FileReader();
        
        reader.onload = async function(e) {
          const base64 = e.target.result.split(',')[1];
          const mimeType = file.type;
          const fileName = file.name;
          
          const res = await fetch(API_URL + '?action=uploadImage', {
            method: 'POST',
            body: JSON.stringify({ base64, mimeType, fileName })
          });
          
          const data = await res.json();
          
          if (data.success) {
            document.getElementById('annImage').value = data.url;
            const preview = document.getElementById('imagePreview');
            preview.src = data.url;
            preview.classList.add('show');
          } else {
            alert('خطا در آپلود: ' + data.message);
          }
          
          uploadBtn.classList.remove('loading');
          uploadBtn.innerHTML = originalHTML;
          document.getElementById('driveFileInput').value = '';
        };
        
        reader.readAsDataURL(file);
      } catch (e) {
        alert('خطا در خواندن فایل');
        uploadBtn.classList.remove('loading');
        uploadBtn.innerHTML = originalHTML;
      }
    });
    
    document.getElementById('annImage').addEventListener('input', function() {
      const url = this.value.trim();
      const preview = document.getElementById('imagePreview');
      if (url) {
        preview.src = url;
        preview.classList.add('show');
      } else {
        preview.classList.remove('show');
      }
    });
    
    async function loadAnnouncements() {
      const list = document.getElementById('announcementsList');
      
      try {
        const res = await fetch(API_URL + '?action=getAnnouncements');
        const data = await res.json();
        
        if (data.success && data.data.length > 0) {
          allAnnouncements = data.data;
          
          list.innerHTML = allAnnouncements.map((ann, index) => {
            const annDate = ann.date ? new Date(ann.date) : null;
            const dateStr = annDate ? annDate.toLocaleDateString('fa-IR') : 'بدون تاریخ';
            
            return `
              <div class="announcement-card">
                <div class="announcement-icon">
                  <i class="fa-solid fa-bullhorn"></i>
                </div>
                <div class="announcement-info">
                  <div class="announcement-name">${ann.title}</div>
                  <div class="announcement-meta">
                    <span><i class="fa-solid fa-clock"></i> ${dateStr}</span>
                    <span><i class="fa-solid fa-tag"></i> ${ann.tag || 'بدون تگ'}</span>
                    <span class="status-badge ${ann.status === 'فعال' ? 'active' : 'inactive'}">
                      ${ann.status || 'فعال'}
                    </span>
                  </div>
                </div>
                <div class="announcement-actions">
                  <button class="action-btn edit-btn" data-index="${index}" title="ویرایش">
                    <i class="fa-solid fa-pen-to-square"></i>
                  </button>
                  <button class="action-btn delete delete-btn" data-index="${index}" title="حذف">
                    <i class="fa-solid fa-trash"></i>
                  </button>
                </div>
              </div>
            `;
          }).join('');
          
          document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', function() {
              const index = parseInt(this.dataset.index);
              const ann = allAnnouncements[index];
              editAnnouncement(ann);
            });
          });
          
          document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', function() {
              const index = parseInt(this.dataset.index);
              const ann = allAnnouncements[index];
              openDeleteModal(ann.id);
            });
          });
          
        } else {
          list.innerHTML = `
            <div style="text-align: center; padding: 32px; color: var(--text-light);">
              <i class="fa-solid fa-bullhorn" style="font-size: 36px; margin-bottom: 8px; display: block; opacity: 0.5;"></i>
              <p style="font-size: 13px;">اطلاعیه‌ای ثبت نشده است</p>
            </div>
          `;
        }
      } catch (e) {
        list.innerHTML = `
          <div style="text-align: center; padding: 32px; color: var(--text-light);">
            <i class="fa-solid fa-circle-exclamation" style="font-size: 36px; margin-bottom: 8px; display: block;"></i>
            <p style="font-size: 13px;">خطا در دریافت اطلاعات</p>
            <button onclick="loadAnnouncements()" style="margin-top: 8px; padding: 6px 14px; background: var(--primary); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; font-family: inherit;">تلاش مجدد</button>
          </div>
        `;
      }
    }
    
    function openAddModal() {
      document.getElementById('modalTitle').innerHTML = '<i class="fa-solid fa-plus"></i> افزودن اطلاعیه جدید';
      document.getElementById('editAnnouncementId').value = '';
      document.getElementById('annTitle').value = '';
      document.getElementById('annImage').value = '';
      document.getElementById('annContent').value = '';
      document.getElementById('annTag').value = '';
      document.getElementById('annDate').value = '';
      document.getElementById('annStatus').value = 'فعال';
      document.getElementById('annError').classList.remove('show');
      document.getElementById('imagePreview').classList.remove('show');
      document.getElementById('announcementModal').classList.add('active');
    }
    
    function editAnnouncement(ann) {
      document.getElementById('modalTitle').innerHTML = '<i class="fa-solid fa-pen-to-square"></i> ویرایش اطلاعیه';
      document.getElementById('editAnnouncementId').value = ann.id;
      document.getElementById('annTitle').value = ann.title;
      document.getElementById('annImage').value = ann.image || '';
      document.getElementById('annContent').value = ann.content || '';
      document.getElementById('annTag').value = ann.tag || '';
      document.getElementById('annDate').value = ann.date || '';
      document.getElementById('annStatus').value = ann.status || 'فعال';
      document.getElementById('annError').classList.remove('show');
      
      const preview = document.getElementById('imagePreview');
      if (ann.image) {
        preview.src = ann.image;
        preview.classList.add('show');
      } else {
        preview.classList.remove('show');
      }
      
      document.getElementById('announcementModal').classList.add('active');
    }
    
    function closeAnnModal() {
      document.getElementById('announcementModal').classList.remove('active');
    }
    
    document.getElementById('addAnnouncementBtn').addEventListener('click', openAddModal);
    document.getElementById('announcementModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('announcementModal')) closeAnnModal();
    });
    
    document.getElementById('submitAnn').addEventListener('click', async () => {
      const id = document.getElementById('editAnnouncementId').value;
      const title = document.getElementById('annTitle').value.trim();
      const image = document.getElementById('annImage').value.trim();
      const content = document.getElementById('annContent').value.trim();
      const tag = document.getElementById('annTag').value.trim();
      const date = document.getElementById('annDate').value;
      const status = document.getElementById('annStatus').value;
      
      if (!title) {
        document.getElementById('annError').textContent = 'عنوان الزامی است';
        document.getElementById('annError').classList.add('show');
        return;
      }
      
      const btn = document.getElementById('submitAnn');
      btn.disabled = true;
      btn.textContent = 'در حال ذخیره...';
      
      try {
        const newId = id || ('ANN-' + Date.now());
        
        const res = await fetch(API_URL + '?action=' + (id ? 'updateAnnouncement' : 'addAnnouncement'), {
          method: 'POST',
          body: JSON.stringify({
            id: newId,
            title,
            image,
            content,
            tag,
            date,
            status
          })
        });
        
        const data = await res.json();
        
        if (data.success) {
          addLogToSheet(newId, admin.id, id ? 'edit' : 'add', 'announcement');
          closeAnnModal();
          loadAnnouncements();
        } else {
          document.getElementById('annError').textContent = data.message || 'خطا در ذخیره‌سازی';
          document.getElementById('annError').classList.add('show');
        }
      } catch (e) {
        document.getElementById('annError').textContent = 'خطا در ارتباط با سرور';
        document.getElementById('annError').classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'ذخیره';
      }
    });
    
    async function addLogToSheet(itemId, adminId, action, type) {
      try {
        await fetch(API_URL + '?action=addLog', {
          method: 'POST',
          body: JSON.stringify({ itemId, adminId, action, type })
        });
      } catch (e) {}
    }
    
    function openDeleteModal(annId) {
      document.getElementById('deleteAnnId').value = annId;
      document.getElementById('deleteModal').classList.add('active');
    }
    
    function closeDeleteModal() {
      document.getElementById('deleteModal').classList.remove('active');
    }
    
    document.getElementById('deleteModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('deleteModal')) closeDeleteModal();
    });
    
    document.getElementById('submitDelete').addEventListener('click', async () => {
      const annId = document.getElementById('deleteAnnId').value;
      
      const btn = document.getElementById('submitDelete');
      btn.disabled = true;
      btn.textContent = 'در حال حذف...';
      
      try {
        const res = await fetch(API_URL + '?action=deleteAnnouncement', {
          method: 'POST',
          body: JSON.stringify({ id: annId })
        });
        
        const data = await res.json();
        
        if (data.success) {
          addLogToSheet(annId, admin.id, 'delete', 'announcement');
          closeDeleteModal();
          loadAnnouncements();
        } else {
          document.getElementById('deleteError').textContent = data.message || 'خطا در حذف';
          document.getElementById('deleteError').classList.add('show');
        }
      } catch (e) {
        document.getElementById('deleteError').textContent = 'خطا در ارتباط با سرور';
        document.getElementById('deleteError').classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'حذف';
      }
    });
    
    loadAnnouncements();
  </script>

</body>
</html>
