<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>داشبورد مدیریت | شهدای گمنام شورابیل</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #f8fafc;
      --bg2: #f1f5f9;
      --bg3: #e2e8f0;
      --primary: #0d9488;
      --primary-dark: #0f766e;
      --primary-light: #5eead4;
      --primary-rgb: 13, 148, 136;
      --dark: #0f172a;
      --text: #334155;
      --text-light: #94a3b8;
      --white: #ffffff;
      --card-bg: #ffffff;
      --card-border: #e2e8f0;
      --shadow: 0 2px 12px rgba(0,0,0,0.04);
      --shadow-hover: 0 8px 24px rgba(0,0,0,0.08);
      --header-bg: #ffffff;
      --logo-filter: none;
    }
    
    [data-theme="dark"] {
      --bg: #0f172a;
      --bg2: #1e293b;
      --bg3: #334155;
      --primary: #14b8a6;
      --primary-dark: #0d9488;
      --primary-light: #5eead4;
      --primary-rgb: 20, 184, 166;
      --dark: #f1f5f9;
      --text: #cbd5e1;
      --text-light: #64748b;
      --white: #1e293b;
      --card-bg: #1e293b;
      --card-border: #334155;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
      --shadow-hover: 0 8px 24px rgba(0,0,0,0.5);
      --header-bg: #1e293b;
      --logo-filter: brightness(0) invert(1);
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: all 0.3s ease;
    }
    
    .header {
      background: var(--header-bg);
      box-shadow: 0 1px 8px rgba(0,0,0,0.03);
      padding: 14px 20px;
      border-bottom: 1px solid var(--bg3);
      transition: all 0.3s ease;
    }
    
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      max-width: 1100px;
      margin: 0 auto;
    }
    
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .header-logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 12px rgba(var(--primary-rgb), 0.2);
      overflow: hidden;
      padding: 6px;
    }
    
    .header-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: var(--logo-filter);
    }
    
    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      transition: color 0.3s;
    }
    
    .header-subtitle {
      font-size: 10px;
      color: var(--text-light);
      transition: color 0.3s;
    }
    
    .header-btns {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .theme-toggle {
      background: var(--bg2);
      border: none;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      color: var(--text);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
    }
    
    .theme-toggle:hover {
      background: var(--primary);
      color: #fff;
      transform: rotate(15deg);
    }
    
    .logout-btn {
      background: #fef2f2;
      border: 1px solid #fecaca;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      color: #dc2626;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: inherit;
    }
    
    .logout-btn:hover {
      background: #dc2626;
      color: #fff;
      border-color: #dc2626;
    }
    
    .main-container {
      max-width: 1100px;
      width: 100%;
      margin: 24px auto;
      padding: 0 12px;
    }
    
    .welcome-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    
    .welcome-avatar {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 22px;
      flex-shrink: 0;
    }
    
    .welcome-info h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 2px;
    }
    
    .welcome-info p {
      font-size: 11px;
      color: var(--text-light);
    }
    
    .welcome-role {
      margin-right: auto;
      font-size: 11px;
      background: var(--bg2);
      padding: 4px 12px;
      border-radius: 8px;
      color: var(--primary-dark);
      font-weight: 600;
    }
    
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    
    .menu-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 24px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: var(--text);
      box-shadow: var(--shadow);
    }
    
    .menu-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
      border-color: var(--primary-light);
    }
    
    .menu-card i {
      font-size: 32px;
      color: var(--primary);
      margin-bottom: 12px;
      display: block;
    }
    
    .menu-card h4 {
      font-size: 14px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 4px;
    }
    
    .menu-card p {
      font-size: 10px;
      color: var(--text-light);
    }
    
    .coming-soon {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .coming-soon:hover {
      transform: none;
      box-shadow: var(--shadow);
      border-color: var(--card-border);
    }
    
    @media (max-width: 650px) {
      .menu-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }
      .header-title {
        font-size: 16px;
      }
      .welcome-card {
        flex-wrap: wrap;
      }
      .welcome-role {
        margin-right: 0;
        width: 100%;
        text-align: center;
        margin-top: 8px;
      }
    }
    
    @media (max-width: 380px) {
      .menu-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-right">
        <div class="header-logo">
          <img src="https://cdn.imgurl.ir/uploads/f57721_InShot_20260714_014548498.png" alt="لوگو">
        </div>
        <div>
          <div class="header-title">پنل مدیریت</div>
          <div class="header-subtitle">شهدای گمنام شورابیل</div>
        </div>
      </div>
      <div class="header-btns">
        <button class="theme-toggle" id="themeToggle" title="تغییر تم">
          <i class="fa-solid fa-moon"></i>
        </button>
        <button class="logout-btn" id="logoutBtn">
          <i class="fa-solid fa-right-from-bracket"></i>
          خروج
        </button>
      </div>
    </div>
  </header>

  <section class="main-container" id="mainContent">
    <div style="text-align: center; padding: 40px; color: var(--text-light);">
      <i class="fa-solid fa-spinner fa-pulse" style="font-size: 32px; margin-bottom: 12px; display: block;"></i>
      <p>در حال بارگذاری...</p>
    </div>
  </section>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbx_D5O9clLXUkq3gwfnT4diExFfmZ1XWEDMkMTHOekDBBVYbi07oH2A4X7rrBzGrUtb/exec';
    const SESSION_DURATION = 30 * 60 * 1000;
    
    function checkSession() {
      const sessionData = localStorage.getItem('admin_session');
      if (!sessionData) {
        window.location.href = 'login.html';
        return null;
      }
      
      try {
        const session = JSON.parse(sessionData);
        if (Date.now() - session.timestamp > SESSION_DURATION) {
          localStorage.removeItem('admin_session');
          window.location.href = 'login.html';
          return null;
        }
        return session;
      } catch (e) {
        localStorage.removeItem('admin_session');
        window.location.href = 'login.html';
        return null;
      }
    }
    
    const session = checkSession();
    if (!session) throw new Error('Session expired');
    
    const admin = session.admin;
    
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('i');
    
    const savedTheme = localStorage.getItem('heyat-theme');
    if (savedTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      themeIcon.classList.replace('fa-moon', 'fa-sun');
    }
    
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      
      if (currentTheme === 'dark') {
        document.documentElement.removeAttribute('data-theme');
        themeIcon.classList.replace('fa-sun', 'fa-moon');
        localStorage.setItem('heyat-theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        themeIcon.classList.replace('fa-moon', 'fa-sun');
        localStorage.setItem('heyat-theme', 'dark');
      }
    });
    
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('admin_session');
      window.location.href = 'login.html';
    });
    
    function buildDashboard() {
      const container = document.getElementById('mainContent');
      
      const roleLabels = {
        'سازنده': 'سازنده',
        'مالک': 'مالک',
        'ادمین ویژه': 'ادمین ویژه',
        'ادمین': 'ادمین'
      };
      
      let menuHTML = '';
      
      if (admin.role === 'سازنده') {
        menuHTML = `
          <div class="menu-grid">
            <a href="admins.html" class="menu-card">
              <i class="fa-solid fa-users-gear"></i>
              <h4>مدیریت مدیران</h4>
              <p>افزودن، حذف و تغییر مقام مدیران</p>
            </a>
            <a href="logs.html" class="menu-card">
              <i class="fa-solid fa-clock-rotate-left"></i>
              <h4>گزارش تغییرات</h4>
              <p>مشاهده گزارش فعالیت مدیران</p>
            </a>
            <div class="menu-card coming-soon">
              <i class="fa-solid fa-gear"></i>
              <h4>تنظیمات</h4>
              <p>به زودی</p>
            </div>
          </div>
        `;
      } else if (admin.role === 'مالک') {
        menuHTML = `
          <div class="menu-grid">
            <a href="events-manage.html" class="menu-card">
              <i class="fa-solid fa-calendar-check"></i>
              <h4>مراسمات</h4>
              <p>مدیریت مراسم‌ها</p>
            </a>
            <a href="announcements-manage.html" class="menu-card">
              <i class="fa-solid fa-bullhorn"></i>
              <h4>اطلاعیه‌ها</h4>
              <p>مدیریت اطلاعیه‌ها</p>
            </a>
            <a href="archive-manage.html" class="menu-card">
              <i class="fa-solid fa-images"></i>
              <h4>آرشیو</h4>
              <p>مدیریت آرشیو مراسمات</p>
            </a>
            <a href="admins.html" class="menu-card">
              <i class="fa-solid fa-users-gear"></i>
              <h4>مدیریت مدیران</h4>
              <p>افزودن و حذف ادمین‌ها</p>
            </a>
            <a href="logs.html" class="menu-card">
              <i class="fa-solid fa-clock-rotate-left"></i>
              <h4>گزارش تغییرات</h4>
              <p>مشاهده گزارش فعالیت مدیران</p>
            </a>
            <div class="menu-card coming-soon">
              <i class="fa-solid fa-gear"></i>
              <h4>تنظیمات</h4>
              <p>به زودی</p>
            </div>
          </div>
        `;
      } else if (admin.role === 'ادمین ویژه') {
        menuHTML = `
          <div class="menu-grid">
            <a href="events-manage.html" class="menu-card">
              <i class="fa-solid fa-calendar-check"></i>
              <h4>مراسمات</h4>
              <p>مدیریت مراسم‌ها</p>
            </a>
            <a href="announcements-manage.html" class="menu-card">
              <i class="fa-solid fa-bullhorn"></i>
              <h4>اطلاعیه‌ها</h4>
              <p>مدیریت اطلاعیه‌ها</p>
            </a>
            <a href="archive-manage.html" class="menu-card">
              <i class="fa-solid fa-images"></i>
              <h4>آرشیو</h4>
              <p>مدیریت آرشیو مراسمات</p>
            </a>
          </div>
        `;
      } else if (admin.role === 'ادمین') {
        menuHTML = `
          <div class="menu-grid">
            <a href="events-manage.html" class="menu-card">
              <i class="fa-solid fa-calendar-check"></i>
              <h4>مراسمات</h4>
              <p>مدیریت مراسم‌های خودم</p>
            </a>
            <a href="announcements-manage.html" class="menu-card">
              <i class="fa-solid fa-bullhorn"></i>
              <h4>اطلاعیه‌ها</h4>
              <p>مدیریت اطلاعیه‌های خودم</p>
            </a>
            <a href="archive-manage.html" class="menu-card">
              <i class="fa-solid fa-images"></i>
              <h4>آرشیو</h4>
              <p>مدیریت آرشیوهای خودم</p>
            </a>
          </div>
        `;
      }
      
      container.innerHTML = `
        <div class="welcome-card">
          <div class="welcome-avatar">
            <i class="fa-solid fa-user"></i>
          </div>
          <div class="welcome-info">
            <h3>${admin.name}</h3>
            <p>@${admin.username}</p>
          </div>
          <span class="welcome-role">${roleLabels[admin.role] || admin.role}</span>
        </div>
        ${menuHTML}
      `;
    }
    
    buildDashboard();
  </script>

</body>
</html>
