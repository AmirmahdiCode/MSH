<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مدیریت مراسمات | شهدای گمنام شورابیل</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #f8fafc;
      --bg2: #f1f5f9;
      --bg3: #e2e8f0;
      --primary: #0d9488;
      --primary-dark: #0f766e;
      --primary-light: #5eead4;
      --primary-rgb: 13, 148, 136;
      --dark: #0f172a;
      --text: #334155;
      --text-light: #94a3b8;
      --white: #ffffff;
      --card-bg: #ffffff;
      --card-border: #e2e8f0;
      --shadow: 0 2px 12px rgba(0,0,0,0.04);
      --shadow-hover: 0 8px 24px rgba(0,0,0,0.08);
      --header-bg: #ffffff;
      --logo-filter: none;
      --danger: #dc2626;
      --danger-light: #fef2f2;
      --success: #10b981;
      --success-light: #ecfdf5;
      --warning: #f59e0b;
    }
    
    [data-theme="dark"] {
      --bg: #0f172a;
      --bg2: #1e293b;
      --bg3: #334155;
      --primary: #14b8a6;
      --primary-dark: #0d9488;
      --primary-light: #5eead4;
      --primary-rgb: 20, 184, 166;
      --dark: #f1f5f9;
      --text: #cbd5e1;
      --text-light: #64748b;
      --white: #1e293b;
      --card-bg: #1e293b;
      --card-border: #334155;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
      --shadow-hover: 0 8px 24px rgba(0,0,0,0.5);
      --header-bg: #1e293b;
      --logo-filter: brightness(0) invert(1);
      --danger-light: #2e1a1a;
      --success-light: #1a2e2b;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: all 0.3s ease;
    }
    
    .header {
      background: var(--header-bg);
      box-shadow: 0 1px 8px rgba(0,0,0,0.03);
      padding: 14px 20px;
      border-bottom: 1px solid var(--bg3);
      transition: all 0.3s ease;
    }
    
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      max-width: 1100px;
      margin: 0 auto;
    }
    
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .header-logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 12px rgba(var(--primary-rgb), 0.2);
      overflow: hidden;
      padding: 6px;
    }
    
    .header-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: var(--logo-filter);
    }
    
    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      transition: color 0.3s;
    }
    
    .header-btns {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .back-btn {
      background: var(--bg2);
      border: none;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      color: var(--text);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      text-decoration: none;
    }
    
    .back-btn:hover {
      background: var(--primary);
      color: #fff;
    }
    
    .theme-toggle {
      background: var(--bg2);
      border: none;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      color: var(--text);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
    }
    
    .theme-toggle:hover {
      background: var(--primary);
      color: #fff;
      transform: rotate(15deg);
    }
    
    .logout-btn {
      background: var(--danger-light);
      border: 1px solid #fecaca;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      color: var(--danger);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: inherit;
    }
    
    .logout-btn:hover {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
    }
    
    .main-container {
      max-width: 1000px;
      width: 100%;
      margin: 24px auto;
      padding: 0 12px;
    }
    
    .page-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .add-btn {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.3s ease;
    }
    
    .add-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(var(--primary-rgb), 0.3);
    }
    
    .events-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .event-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }
    
    .event-image {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      object-fit: cover;
      background: var(--bg2);
      flex-shrink: 0;
    }
    
    .event-image.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: var(--primary);
    }
    
    .event-info {
      flex: 1;
      min-width: 0;
    }
    
    .event-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 4px;
    }
    
    .event-meta {
      font-size: 10px;
      color: var(--text-light);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .event-meta span {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    
    .event-actions {
      display: flex;
      gap: 6px;
    }
    
    .action-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      background: var(--bg2);
      color: var(--text);
    }
    
    .action-btn:hover {
      background: var(--primary);
      color: #fff;
    }
    
    .action-btn.delete:hover {
      background: var(--danger);
      color: #fff;
    }
    
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      padding: 20px;
    }
    
    .modal-overlay.active {
      display: flex;
    }
    
    .modal {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .modal h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 16px;
    }
    
    .form-group {
      margin-bottom: 14px;
    }
    
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    
    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      transition: all 0.3s ease;
    }
    
    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }
    
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.1);
    }
    
    .modal-btns {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 20px;
    }
    
    .btn-cancel {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }
    
    .btn-submit {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
    }
    
    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .error-text {
      color: var(--danger);
      font-size: 10px;
      margin-top: 4px;
      display: none;
    }
    
    .error-text.show {
      display: block;
    }
    
    @media (max-width: 650px) {
      .event-card {
        flex-wrap: wrap;
        gap: 10px;
      }
      .event-actions {
        width: 100%;
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-right">
        <div class="header-logo">
          <img src="https://cdn.imgurl.ir/uploads/f57721_InShot_20260714_014548498.png" alt="لوگو">
        </div>
        <div>
          <div class="header-title">مدیریت مراسمات</div>
        </div>
      </div>
      <div class="header-btns">
        <a href="dashboard.html" class="back-btn" title="بازگشت">
          <i class="fa-solid fa-arrow-right"></i>
        </a>
        <button class="theme-toggle" id="themeToggle" title="تغییر تم">
          <i class="fa-solid fa-moon"></i>
        </button>
        <button class="logout-btn" id="logoutBtn">
          <i class="fa-solid fa-right-from-bracket"></i>
          خروج
        </button>
      </div>
    </div>
  </header>

  <section class="main-container">
    <div class="page-title">
      <i class="fa-solid fa-calendar-check"></i>
      لیست مراسمات
      <button class="add-btn" id="addEventBtn">
        <i class="fa-solid fa-plus"></i>
        افزودن مراسم
      </button>
    </div>
    
    <div class="events-list" id="eventsList">
      <div style="text-align: center; padding: 32px; color: var(--text-light);">
        <i class="fa-solid fa-spinner fa-pulse"></i>
        <p style="margin-top: 8px; font-size: 12px;">در حال بارگذاری...</p>
      </div>
    </div>
  </section>

  <div class="modal-overlay" id="eventModal">
    <div class="modal">
      <h3 id="modalTitle"><i class="fa-solid fa-plus"></i> افزودن مراسم جدید</h3>
      <input type="hidden" id="editEventId">
      <div class="form-group">
        <label>عنوان</label>
        <input type="text" class="form-input" id="eventTitle" placeholder="عنوان مراسم">
      </div>
      <div class="form-group">
        <label>لینک تصویر</label>
        <input type="url" class="form-input" id="eventImage" placeholder="https://...">
      </div>
      <div class="form-group">
        <label>توضیحات</label>
        <textarea class="form-textarea" id="eventDescription" placeholder="توضیحات مراسم..."></textarea>
      </div>
      <div class="form-group">
        <label>تگ</label>
        <input type="text" class="form-input" id="eventTag" placeholder="مثلاً: عزاداری، جشن، دعا">
      </div>
      <div class="form-group">
        <label>تاریخ برگزاری</label>
        <input type="date" class="form-input" id="eventDate">
      </div>
      <div class="form-group">
        <label>مکان</label>
        <input type="text" class="form-input" id="eventLocation" placeholder="مکان برگزاری">
      </div>
      <div class="error-text" id="eventError"></div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeEventModal()">انصراف</button>
        <button class="btn-submit" id="submitEvent">ذخیره</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <h3><i class="fa-solid fa-triangle-exclamation" style="color: var(--danger);"></i> حذف مراسم</h3>
      <p style="font-size: 13px; color: var(--text); margin-bottom: 16px;">آیا از حذف این مراسم اطمینان دارید؟</p>
      <input type="hidden" id="deleteEventId">
      <div class="error-text" id="deleteError"></div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeDeleteModal()">انصراف</button>
        <button class="btn-submit" id="submitDelete" style="background: var(--danger);">حذف</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwS7_upFNhRFx_yc_EDinq__A-JeChjVABVrtuE8OuCnLciUaw0KqO9uVzdYdRQJxea/exec';
    const ADMIN_API_URL = 'https://script.google.com/macros/s/AKfycbx_D5O9clLXUkq3gwfnT4diExFfmZ1XWEDMkMTHOekDBBVYbi07oH2A4X7rrBzGrUtb/exec';
    const SESSION_DURATION = 30 * 60 * 1000;
    
    function checkSession() {
      const sessionData = localStorage.getItem('admin_session');
      if (!sessionData) {
        window.location.href = 'login.html';
        return null;
      }
      
      try {
        const session = JSON.parse(sessionData);
        if (Date.now() - session.timestamp > SESSION_DURATION) {
          localStorage.removeItem('admin_session');
          window.location.href = 'login.html';
          return null;
        }
        return session;
      } catch (e) {
        localStorage.removeItem('admin_session');
        window.location.href = 'login.html';
        return null;
      }
    }
    
    const session = checkSession();
    if (!session) throw new Error('Session expired');
    
    const admin = session.admin;
    
    if (admin.role !== 'مالک' && admin.role !== 'ادمین ویژه' && admin.role !== 'ادمین') {
      window.location.href = 'dashboard.html';
    }
    
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('i');
    
    const savedTheme = localStorage.getItem('heyat-theme');
    if (savedTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      themeIcon.classList.replace('fa-moon', 'fa-sun');
    }
    
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      
      if (currentTheme === 'dark') {
        document.documentElement.removeAttribute('data-theme');
        themeIcon.classList.replace('fa-sun', 'fa-moon');
        localStorage.setItem('heyat-theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        themeIcon.classList.replace('fa-moon', 'fa-sun');
        localStorage.setItem('heyat-theme', 'dark');
      }
    });
    
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('admin_session');
      window.location.href = 'login.html';
    });
    
    async function loadEvents() {
      const list = document.getElementById('eventsList');
      
      try {
        const res = await fetch(API_URL + '?action=getEvents');
        const data = await res.json();
        
        if (data.success && data.data.length > 0) {
          list.innerHTML = data.data.map(event => {
            const eventDate = new Date(event.date);
            const dateStr = eventDate.toLocaleDateString('fa-IR');
            
            return `
              <div class="event-card">
                ${event.image ? 
                  `<img src="${event.image}" class="event-image" alt="${event.title}">` : 
                  `<div class="event-image placeholder"><i class="fa-solid fa-mosque"></i></div>`
                }
                <div class="event-info">
                  <div class="event-name">${event.title}</div>
                  <div class="event-meta">
                    <span><i class="fa-solid fa-clock"></i> ${dateStr}</span>
                    <span><i class="fa-solid fa-location-dot"></i> ${event.location || 'نامشخص'}</span>
                    <span><i class="fa-solid fa-tag"></i> ${event.tag || 'بدون تگ'}</span>
                  </div>
                </div>
                <div class="event-actions">
                  <button class="action-btn" onclick="editEvent('${event.id}', '${event.title.replace(/'/g, "\\'")}', '${(event.image || '').replace(/'/g, "\\'")}', '${(event.description || '').replace(/'/g, "\\'")}', '${(event.tag || '').replace(/'/g, "\\'")}', '${event.date}', '${(event.location || '').replace(/'/g, "\\'")}')" title="ویرایش">
                    <i class="fa-solid fa-pen-to-square"></i>
                  </button>
                  <button class="action-btn delete" onclick="openDeleteModal('${event.id}')" title="حذف">
                    <i class="fa-solid fa-trash"></i>
                  </button>
                </div>
              </div>
            `;
          }).join('');
        } else {
          list.innerHTML = `
            <div style="text-align: center; padding: 32px; color: var(--text-light);">
              <i class="fa-solid fa-calendar-xmark" style="font-size: 36px; margin-bottom: 8px; display: block;"></i>
              <p style="font-size: 13px;">مراسمی ثبت نشده است</p>
            </div>
          `;
        }
      } catch (e) {
        list.innerHTML = `
          <div style="text-align: center; padding: 32px; color: var(--text-light);">
            <i class="fa-solid fa-circle-exclamation" style="font-size: 36px; margin-bottom: 8px; display: block;"></i>
            <p style="font-size: 13px;">خطا در دریافت اطلاعات</p>
            <button onclick="loadEvents()" style="margin-top: 8px; padding: 6px 14px; background: var(--primary); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; font-family: inherit;">تلاش مجدد</button>
          </div>
        `;
      }
    }
    
    function openAddModal() {
      document.getElementById('modalTitle').innerHTML = '<i class="fa-solid fa-plus"></i> افزودن مراسم جدید';
      document.getElementById('editEventId').value = '';
      document.getElementById('eventTitle').value = '';
      document.getElementById('eventImage').value = '';
      document.getElementById('eventDescription').value = '';
      document.getElementById('eventTag').value = '';
      document.getElementById('eventDate').value = '';
      document.getElementById('eventLocation').value = '';
      document.getElementById('eventError').classList.remove('show');
      document.getElementById('eventModal').classList.add('active');
    }
    
    function editEvent(id, title, image, description, tag, date, location) {
      document.getElementById('modalTitle').innerHTML = '<i class="fa-solid fa-pen-to-square"></i> ویرایش مراسم';
      document.getElementById('editEventId').value = id;
      document.getElementById('eventTitle').value = title;
      document.getElementById('eventImage').value = image;
      document.getElementById('eventDescription').value = description;
      document.getElementById('eventTag').value = tag;
      document.getElementById('eventDate').value = date;
      document.getElementById('eventLocation').value = location;
      document.getElementById('eventError').classList.remove('show');
      document.getElementById('eventModal').classList.add('active');
    }
    
    function closeEventModal() {
      document.getElementById('eventModal').classList.remove('active');
    }
    
    document.getElementById('addEventBtn').addEventListener('click', openAddModal);
    document.getElementById('eventModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('eventModal')) closeEventModal();
    });
    
    document.getElementById('submitEvent').addEventListener('click', async () => {
      const id = document.getElementById('editEventId').value;
      const title = document.getElementById('eventTitle').value.trim();
      const image = document.getElementById('eventImage').value.trim();
      const description = document.getElementById('eventDescription').value.trim();
      const tag = document.getElementById('eventTag').value.trim();
      const date = document.getElementById('eventDate').value;
      const location = document.getElementById('eventLocation').value.trim();
      
      if (!title || !date) {
        document.getElementById('eventError').textContent = 'عنوان و تاریخ الزامی است';
        document.getElementById('eventError').classList.add('show');
        return;
      }
      
      const btn = document.getElementById('submitEvent');
      btn.disabled = true;
      btn.textContent = 'در حال ذخیره...';
      
      try {
        if (id) {
          await updateEventInSheet(id, title, image, description, tag, date, location);
        } else {
          await addEventToSheet(title, image, description, tag, date, location);
        }
        
        closeEventModal();
        loadEvents();
        addLogToSheet(id || ('EVT-' + Date.now()), admin.id, id ? 'edit' : 'add', 'event');
      } catch (e) {
        document.getElementById('eventError').textContent = 'خطا در ذخیره‌سازی';
        document.getElementById('eventError').classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'ذخیره';
      }
    });
    
    async function addEventToSheet(title, image, description, tag, date, location) {
      const id = 'EVT-' + Date.now();
      
      return fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'addEvent',
          id, title, image, description, tag, date, location
        })
      });
    }
    
    async function updateEventInSheet(id, title, image, description, tag, date, location) {
      return fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'updateEvent',
          id, title, image, description, tag, date, location
        })
      });
    }
    
    async function addLogToSheet(itemId, adminId, action, type) {
      try {
        await fetch(ADMIN_API_URL + '?action=addLog', {
          method: 'POST',
          body: JSON.stringify({ itemId, adminId, action, type })
        });
      } catch (e) {}
    }
    
    function openDeleteModal(eventId) {
      document.getElementById('deleteEventId').value = eventId;
      document.getElementById('deleteModal').classList.add('active');
    }
    
    function closeDeleteModal() {
      document.getElementById('deleteModal').classList.remove('active');
    }
    
    document.getElementById('deleteModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('deleteModal')) closeDeleteModal();
    });
    
    document.getElementById('submitDelete').addEventListener('click', async () => {
      const eventId = document.getElementById('deleteEventId').value;
      
      const btn = document.getElementById('submitDelete');
      btn.disabled = true;
      btn.textContent = 'در حال حذف...';
      
      try {
        await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'deleteEvent', id: eventId })
        });
        
        addLogToSheet(eventId, admin.id, 'delete', 'event');
        closeDeleteModal();
        loadEvents();
      } catch (e) {
        document.getElementById('deleteError').textContent = 'خطا در حذف';
        document.getElementById('deleteError').classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'حذف';
      }
    });
    
    loadEvents();
  </script>

</body>
</html>
