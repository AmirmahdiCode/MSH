<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مدیریت مدیران | شهدای گمنام شورابیل</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #f8fafc;
      --bg2: #f1f5f9;
      --bg3: #e2e8f0;
      --primary: #0d9488;
      --primary-dark: #0f766e;
      --primary-light: #5eead4;
      --primary-rgb: 13, 148, 136;
      --dark: #0f172a;
      --text: #334155;
      --text-light: #94a3b8;
      --white: #ffffff;
      --card-bg: #ffffff;
      --card-border: #e2e8f0;
      --shadow: 0 2px 12px rgba(0,0,0,0.04);
      --shadow-hover: 0 8px 24px rgba(0,0,0,0.08);
      --header-bg: #ffffff;
      --logo-filter: none;
      --danger: #dc2626;
      --danger-light: #fef2f2;
    }
    
    [data-theme="dark"] {
      --bg: #0f172a;
      --bg2: #1e293b;
      --bg3: #334155;
      --primary: #14b8a6;
      --primary-dark: #0d9488;
      --primary-light: #5eead4;
      --primary-rgb: 20, 184, 166;
      --dark: #f1f5f9;
      --text: #cbd5e1;
      --text-light: #64748b;
      --white: #1e293b;
      --card-bg: #1e293b;
      --card-border: #334155;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
      --shadow-hover: 0 8px 24px rgba(0,0,0,0.5);
      --header-bg: #1e293b;
      --logo-filter: brightness(0) invert(1);
      --danger-light: #2e1a1a;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: all 0.3s ease;
    }
    
    .header {
      background: var(--header-bg);
      box-shadow: 0 1px 8px rgba(0,0,0,0.03);
      padding: 14px 20px;
      border-bottom: 1px solid var(--bg3);
      transition: all 0.3s ease;
    }
    
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      max-width: 1100px;
      margin: 0 auto;
    }
    
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .header-logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 12px rgba(var(--primary-rgb), 0.2);
      overflow: hidden;
      padding: 6px;
    }
    
    .header-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: var(--logo-filter);
    }
    
    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      transition: color 0.3s;
    }
    
    .header-btns {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .back-btn {
      background: var(--bg2);
      border: none;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      color: var(--text);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      text-decoration: none;
    }
    
    .back-btn:hover {
      background: var(--primary);
      color: #fff;
    }
    
    .theme-toggle {
      background: var(--bg2);
      border: none;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      color: var(--text);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
    }
    
    .theme-toggle:hover {
      background: var(--primary);
      color: #fff;
      transform: rotate(15deg);
    }
    
    .logout-btn {
      background: var(--danger-light);
      border: 1px solid #fecaca;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      color: var(--danger);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: inherit;
    }
    
    .logout-btn:hover {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
    }
    
    .main-container {
      max-width: 900px;
      width: 100%;
      margin: 24px auto;
      padding: 0 12px;
    }
    
    .page-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .add-btn {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.3s ease;
    }
    
    .add-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(var(--primary-rgb), 0.3);
    }
    
    .admins-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .admin-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }
    
    .admin-avatar {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      flex-shrink: 0;
    }
    
    .admin-info {
      flex: 1;
      min-width: 0;
    }
    
    .admin-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 2px;
    }
    
    .admin-username {
      font-size: 10px;
      color: var(--text-light);
    }
    
    .admin-role {
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 600;
      background: var(--bg2);
      color: var(--primary-dark);
    }
    
    .admin-role.owner {
      background: #fef3c7;
      color: #d97706;
    }
    
    .admin-role.maker {
      background: #fce7f3;
      color: #db2777;
    }
    
    .admin-actions {
      display: flex;
      gap: 6px;
    }
    
    .action-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      background: var(--bg2);
      color: var(--text);
    }
    
    .action-btn:hover {
      background: var(--primary);
      color: #fff;
    }
    
    .action-btn.delete:hover {
      background: var(--danger);
      color: #fff;
    }
    
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }
    
    .modal-overlay.active {
      display: flex;
    }
    
    .modal {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    
    .modal h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 16px;
    }
    
    .form-group {
      margin-bottom: 14px;
    }
    
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    
    .form-input, .form-select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      transition: all 0.3s ease;
    }
    
    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.1);
    }
    
    .modal-btns {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 20px;
    }
    
    .btn-cancel {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }
    
    .btn-submit {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
    }
    
    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .error-text {
      color: var(--danger);
      font-size: 10px;
      margin-top: 4px;
      display: none;
    }
    
    .error-text.show {
      display: block;
    }
    
    @media (max-width: 650px) {
      .admin-card {
        flex-wrap: wrap;
        gap: 10px;
      }
      .admin-actions {
        width: 100%;
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-right">
        <div class="header-logo">
          <img src="https://cdn.imgurl.ir/uploads/f57721_InShot_20260714_014548498.png" alt="لوگو">
        </div>
        <div>
          <div class="header-title">مدیریت مدیران</div>
        </div>
      </div>
      <div class="header-btns">
        <a href="dashboard.html" class="back-btn" title="بازگشت">
          <i class="fa-solid fa-arrow-right"></i>
        </a>
        <button class="theme-toggle" id="themeToggle" title="تغییر تم">
          <i class="fa-solid fa-moon"></i>
        </button>
        <button class="logout-btn" id="logoutBtn">
          <i class="fa-solid fa-right-from-bracket"></i>
          خروج
        </button>
      </div>
    </div>
  </header>

  <section class="main-container">
    <div class="page-title">
      <i class="fa-solid fa-users-gear"></i>
      لیست مدیران
      <button class="add-btn" id="addAdminBtn">
        <i class="fa-solid fa-plus"></i>
        افزودن مدیر
      </button>
    </div>
    
    <div class="admins-list" id="adminsList">
      <div style="text-align: center; padding: 32px; color: var(--text-light);">
        <i class="fa-solid fa-spinner fa-pulse"></i>
        <p style="margin-top: 8px; font-size: 12px;">در حال بارگذاری...</p>
      </div>
    </div>
  </section>

  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <h3><i class="fa-solid fa-user-plus"></i> افزودن مدیر جدید</h3>
      <div class="form-group">
        <label>نام</label>
        <input type="text" class="form-input" id="addName" placeholder="نام مدیر">
      </div>
      <div class="form-group">
        <label>نام کاربری</label>
        <input type="text" class="form-input" id="addUsername" placeholder="نام کاربری">
      </div>
      <div class="form-group">
        <label>رمز عبور</label>
        <input type="password" class="form-input" id="addPassword" placeholder="رمز عبور">
      </div>
      <div class="form-group">
        <label>مقام</label>
        <select class="form-select" id="addRole">
          <option value="ادمین">ادمین</option>
          <option value="ادمین ویژه">ادمین ویژه</option>
        </select>
      </div>
      <div class="error-text" id="addError"></div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeAddModal()">انصراف</button>
        <button class="btn-submit" id="submitAdd">افزودن</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <h3><i class="fa-solid fa-pen-to-square"></i> تغییر مقام</h3>
      <div class="form-group">
        <label>مقام جدید</label>
        <select class="form-select" id="editRole">
          <option value="سازنده">سازنده</option>
          <option value="مالک">مالک</option>
          <option value="ادمین ویژه">ادمین ویژه</option>
          <option value="ادمین">ادمین</option>
        </select>
        <input type="hidden" id="editTargetId">
      </div>
      <div class="error-text" id="editError"></div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeEditModal()">انصراف</button>
        <button class="btn-submit" id="submitEdit">ذخیره</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <h3><i class="fa-solid fa-triangle-exclamation" style="color: var(--danger);"></i> حذف مدیر</h3>
      <p style="font-size: 13px; color: var(--text); margin-bottom: 16px;">آیا از حذف این مدیر اطمینان دارید؟</p>
      <input type="hidden" id="deleteTargetId">
      <div class="error-text" id="deleteError"></div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeDeleteModal()">انصراف</button>
        <button class="btn-submit" id="submitDelete" style="background: var(--danger);">حذف</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbx_D5O9clLXUkq3gwfnT4diExFfmZ1XWEDMkMTHOekDBBVYbi07oH2A4X7rrBzGrUtb/exec';
    const SESSION_DURATION = 30 * 60 * 1000;
    
    function checkSession() {
      const sessionData = localStorage.getItem('admin_session');
      if (!sessionData) {
        window.location.href = 'login.html';
        return null;
      }
      
      try {
        const session = JSON.parse(sessionData);
        if (Date.now() - session.timestamp > SESSION_DURATION) {
          localStorage.removeItem('admin_session');
          window.location.href = 'login.html';
          return null;
        }
        return session;
      } catch (e) {
        localStorage.removeItem('admin_session');
        window.location.href = 'login.html';
        return null;
      }
    }
    
    const session = checkSession();
    if (!session) throw new Error('Session expired');
    
    const admin = session.admin;
    
    if (admin.role !== 'سازنده' && admin.role !== 'مالک') {
      window.location.href = 'dashboard.html';
    }
    
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('i');
    
    const savedTheme = localStorage.getItem('heyat-theme');
    if (savedTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      themeIcon.classList.replace('fa-moon', 'fa-sun');
    }
    
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      
      if (currentTheme === 'dark') {
        document.documentElement.removeAttribute('data-theme');
        themeIcon.classList.replace('fa-sun', 'fa-moon');
        localStorage.setItem('heyat-theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        themeIcon.classList.replace('fa-moon', 'fa-sun');
        localStorage.setItem('heyat-theme', 'dark');
      }
    });
    
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('admin_session');
      window.location.href = 'login.html';
    });
    
    async function loadAdmins() {
      const list = document.getElementById('adminsList');
      
      try {
        const res = await fetch(API_URL + '?action=getAdmins', {
          method: 'POST',
          body: JSON.stringify({ adminId: admin.id })
        });
        
        const data = await res.json();
        
        if (data.success && data.data.length > 0) {
          list.innerHTML = data.data.map(item => {
            let roleClass = '';
            if (item.role === 'سازنده') roleClass = 'maker';
            else if (item.role === 'مالک') roleClass = 'owner';
            
            let actionsHTML = '';
            
            if (admin.role === 'سازنده') {
              if (item.role !== 'سازنده') {
                actionsHTML = `
                  <button class="action-btn" onclick="openEditModal('${item.id}', '${item.role}')" title="تغییر مقام">
                    <i class="fa-solid fa-pen-to-square"></i>
                  </button>
                  <button class="action-btn delete" onclick="openDeleteModal('${item.id}')" title="حذف">
                    <i class="fa-solid fa-trash"></i>
                  </button>
                `;
              }
            } else if (admin.role === 'مالک') {
              if (item.role === 'ادمین' || item.role === 'ادمین ویژه') {
                actionsHTML = `
                  <button class="action-btn delete" onclick="openDeleteModal('${item.id}')" title="حذف">
                    <i class="fa-solid fa-trash"></i>
                  </button>
                `;
              }
            }
            
            return `
              <div class="admin-card">
                <div class="admin-avatar">
                  <i class="fa-solid fa-user"></i>
                </div>
                <div class="admin-info">
                  <div class="admin-name">${item.name}</div>
                  <div class="admin-username">@${item.username}</div>
                </div>
                <span class="admin-role ${roleClass}">${item.role}</span>
                ${actionsHTML ? `<div class="admin-actions">${actionsHTML}</div>` : ''}
              </div>
            `;
          }).join('');
        } else {
          list.innerHTML = `
            <div style="text-align: center; padding: 32px; color: var(--text-light);">
              <i class="fa-solid fa-users-slash" style="font-size: 36px; margin-bottom: 8px; display: block;"></i>
              <p style="font-size: 13px;">مدیری یافت نشد</p>
            </div>
          `;
        }
      } catch (e) {
        list.innerHTML = `
          <div style="text-align: center; padding: 32px; color: var(--text-light);">
            <i class="fa-solid fa-circle-exclamation" style="font-size: 36px; margin-bottom: 8px; display: block;"></i>
            <p style="font-size: 13px;">خطا در دریافت اطلاعات</p>
            <button onclick="loadAdmins()" style="margin-top: 8px; padding: 6px 14px; background: var(--primary); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; font-family: inherit;">تلاش مجدد</button>
          </div>
        `;
      }
    }
    
    function openAddModal() {
      document.getElementById('addModal').classList.add('active');
      document.getElementById('addName').focus();
    }
    
    function closeAddModal() {
      document.getElementById('addModal').classList.remove('active');
      document.getElementById('addName').value = '';
      document.getElementById('addUsername').value = '';
      document.getElementById('addPassword').value = '';
      document.getElementById('addRole').value = 'ادمین';
      document.getElementById('addError').classList.remove('show');
    }
    
    document.getElementById('addAdminBtn').addEventListener('click', openAddModal);
    document.getElementById('addModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('addModal')) closeAddModal();
    });
    
    document.getElementById('submitAdd').addEventListener('click', async () => {
      const name = document.getElementById('addName').value.trim();
      const username = document.getElementById('addUsername').value.trim();
      const password = document.getElementById('addPassword').value;
      const role = document.getElementById('addRole').value;
      
      if (!name || !username || !password) {
        document.getElementById('addError').textContent = 'لطفاً همه فیلدها را پر کنید';
        document.getElementById('addError').classList.add('show');
        return;
      }
      
      const btn = document.getElementById('submitAdd');
      btn.disabled = true;
      btn.textContent = 'در حال افزودن...';
      
      try {
        const res = await fetch(API_URL + '?action=addAdmin', {
          method: 'POST',
          body: JSON.stringify({ adminId: admin.id, name, username, password, role })
        });
        
        const data = await res.json();
        
        if (data.success) {
          closeAddModal();
          loadAdmins();
        } else {
          document.getElementById('addError').textContent = data.message;
          document.getElementById('addError').classList.add('show');
        }
      } catch (e) {
        document.getElementById('addError').textContent = 'خطا در ارتباط با سرور';
        document.getElementById('addError').classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'افزودن';
      }
    });
    
    function openEditModal(targetId, currentRole) {
      document.getElementById('editTargetId').value = targetId;
      document.getElementById('editRole').value = currentRole;
      document.getElementById('editModal').classList.add('active');
    }
    
    function closeEditModal() {
      document.getElementById('editModal').classList.remove('active');
      document.getElementById('editError').classList.remove('show');
    }
    
    document.getElementById('editModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('editModal')) closeEditModal();
    });
    
    document.getElementById('submitEdit').addEventListener('click', async () => {
      const targetId = document.getElementById('editTargetId').value;
      const newRole = document.getElementById('editRole').value;
      
      const btn = document.getElementById('submitEdit');
      btn.disabled = true;
      btn.textContent = 'در حال ذخیره...';
      
      try {
        const res = await fetch(API_URL + '?action=changeRole', {
          method: 'POST',
          body: JSON.stringify({ adminId: admin.id, targetId, newRole })
        });
        
        const data = await res.json();
        
        if (data.success) {
          closeEditModal();
          loadAdmins();
        } else {
          document.getElementById('editError').textContent = data.message;
          document.getElementById('editError').classList.add('show');
        }
      } catch (e) {
        document.getElementById('editError').textContent = 'خطا در ارتباط با سرور';
        document.getElementById('editError').classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'ذخیره';
      }
    });
    
    function openDeleteModal(targetId) {
      document.getElementById('deleteTargetId').value = targetId;
      document.getElementById('deleteModal').classList.add('active');
    }
    
    function closeDeleteModal() {
      document.getElementById('deleteModal').classList.remove('active');
      document.getElementById('deleteError').classList.remove('show');
    }
    
    document.getElementById('deleteModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('deleteModal')) closeDeleteModal();
    });
    
    document.getElementById('submitDelete').addEventListener('click', async () => {
      const targetId = document.getElementById('deleteTargetId').value;
      
      const btn = document.getElementById('submitDelete');
      btn.disabled = true;
      btn.textContent = 'در حال حذف...';
      
      try {
        const res = await fetch(API_URL + '?action=deleteAdmin', {
          method: 'POST',
          body: JSON.stringify({ adminId: admin.id, targetId })
        });
        
        const data = await res.json();
        
        if (data.success) {
          closeDeleteModal();
          loadAdmins();
        } else {
          document.getElementById('deleteError').textContent = data.message;
          document.getElementById('deleteError').classList.add('show');
        }
      } catch (e) {
        document.getElementById('deleteError').textContent = 'خطا در ارتباط با سرور';
        document.getElementById('deleteError').classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'حذف';
      }
    });
    
    loadAdmins();
  </script>

</body>
</html>
