<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>گزارش تغییرات | شهدای گمنام شورابیل</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #f8fafc;
      --bg2: #f1f5f9;
      --bg3: #e2e8f0;
      --primary: #0d9488;
      --primary-dark: #0f766e;
      --primary-light: #5eead4;
      --primary-rgb: 13, 148, 136;
      --dark: #0f172a;
      --text: #334155;
      --text-light: #94a3b8;
      --white: #ffffff;
      --card-bg: #ffffff;
      --card-border: #e2e8f0;
      --shadow: 0 2px 12px rgba(0,0,0,0.04);
      --header-bg: #ffffff;
      --logo-filter: none;
      --danger: #dc2626;
      --danger-light: #fef2f2;
      --success: #10b981;
      --success-light: #ecfdf5;
      --warning: #f59e0b;
      --warning-light: #fffbeb;
      --info: #3b82f6;
      --info-light: #eff6ff;
    }
    
    [data-theme="dark"] {
      --bg: #0f172a;
      --bg2: #1e293b;
      --bg3: #334155;
      --primary: #14b8a6;
      --primary-dark: #0d9488;
      --primary-light: #5eead4;
      --primary-rgb: 20, 184, 166;
      --dark: #f1f5f9;
      --text: #cbd5e1;
      --text-light: #64748b;
      --white: #1e293b;
      --card-bg: #1e293b;
      --card-border: #334155;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
      --header-bg: #1e293b;
      --logo-filter: brightness(0) invert(1);
      --danger-light: #2e1a1a;
      --success-light: #1a2e2b;
      --warning-light: #2e2a1a;
      --info-light: #1a1e2e;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: all 0.3s ease;
    }
    
    .header {
      background: var(--header-bg);
      box-shadow: 0 1px 8px rgba(0,0,0,0.03);
      padding: 14px 20px;
      border-bottom: 1px solid var(--bg3);
      transition: all 0.3s ease;
    }
    
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      max-width: 1100px;
      margin: 0 auto;
    }
    
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .header-logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 12px rgba(var(--primary-rgb), 0.2);
      overflow: hidden;
      padding: 6px;
    }
    
    .header-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: var(--logo-filter);
    }
    
    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      transition: color 0.3s;
    }
    
    .header-btns {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .back-btn {
      background: var(--bg2);
      border: none;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      color: var(--text);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      text-decoration: none;
    }
    
    .back-btn:hover {
      background: var(--primary);
      color: #fff;
    }
    
    .theme-toggle {
      background: var(--bg2);
      border: none;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      color: var(--text);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
    }
    
    .theme-toggle:hover {
      background: var(--primary);
      color: #fff;
      transform: rotate(15deg);
    }
    
    .logout-btn {
      background: var(--danger-light);
      border: 1px solid #fecaca;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      color: var(--danger);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: inherit;
    }
    
    .logout-btn:hover {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
    }
    
    .main-container {
      max-width: 900px;
      width: 100%;
      margin: 24px auto;
      padding: 0 12px;
    }
    
    .page-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .logs-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .log-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }
    
    .log-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }
    
    .log-icon.add {
      background: var(--success-light);
      color: var(--success);
    }
    
    .log-icon.edit {
      background: var(--warning-light);
      color: var(--warning);
    }
    
    .log-icon.delete {
      background: var(--danger-light);
      color: var(--danger);
    }
    
    .log-info {
      flex: 1;
      min-width: 0;
    }
    
    .log-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 3px;
    }
    
    .log-details {
      font-size: 10px;
      color: var(--text-light);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .log-details span {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    
    .log-badge {
      font-size: 9px;
      padding: 3px 8px;
      border-radius: 6px;
      font-weight: 600;
      white-space: nowrap;
    }
    
    .log-badge.add {
      background: var(--success-light);
      color: var(--success);
    }
    
    .log-badge.edit {
      background: var(--warning-light);
      color: var(--warning);
    }
    
    .log-badge.delete {
      background: var(--danger-light);
      color: var(--danger);
    }
    
    .log-badge.event {
      background: var(--info-light);
      color: var(--info);
    }
    
    .log-badge.announcement {
      background: #fce7f3;
      color: #db2777;
    }
    
    .log-badge.archive {
      background: #ede9fe;
      color: #7c3aed;
    }
    
    .log-badge.admin {
      background: #fef3c7;
      color: #d97706;
    }
    
    [data-theme="dark"] .log-badge.announcement {
      background: #2e1a2e;
      color: #f472b6;
    }
    
    [data-theme="dark"] .log-badge.archive {
      background: #1e1a2e;
      color: #a78bfa;
    }
    
    [data-theme="dark"] .log-badge.admin {
      background: #2e2a1a;
      color: #fbbf24;
    }
    
    @media (max-width: 650px) {
      .log-card {
        flex-wrap: wrap;
        gap: 10px;
      }
      .log-details {
        flex-direction: column;
        gap: 4px;
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-right">
        <div class="header-logo">
          <img src="https://cdn.imgurl.ir/uploads/f57721_InShot_20260714_014548498.png" alt="لوگو">
        </div>
        <div>
          <div class="header-title">گزارش تغییرات</div>
        </div>
      </div>
      <div class="header-btns">
        <a href="dashboard.html" class="back-btn" title="بازگشت">
          <i class="fa-solid fa-arrow-right"></i>
        </a>
        <button class="theme-toggle" id="themeToggle" title="تغییر تم">
          <i class="fa-solid fa-moon"></i>
        </button>
        <button class="logout-btn" id="logoutBtn">
          <i class="fa-solid fa-right-from-bracket"></i>
          خروج
        </button>
      </div>
    </div>
  </header>

  <section class="main-container">
    <div class="page-title">
      <i class="fa-solid fa-clock-rotate-left"></i>
      گزارش فعالیت مدیران
    </div>
    
    <div class="logs-list" id="logsList">
      <div style="text-align: center; padding: 32px; color: var(--text-light);">
        <i class="fa-solid fa-spinner fa-pulse"></i>
        <p style="margin-top: 8px; font-size: 12px;">در حال بارگذاری...</p>
      </div>
    </div>
  </section>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbx_D5O9clLXUkq3gwfnT4diExFfmZ1XWEDMkMTHOekDBBVYbi07oH2A4X7rrBzGrUtb/exec';
    const SESSION_DURATION = 30 * 60 * 1000;
    
    function checkSession() {
      const sessionData = localStorage.getItem('admin_session');
      if (!sessionData) {
        window.location.href = 'login.html';
        return null;
      }
      
      try {
        const session = JSON.parse(sessionData);
        if (Date.now() - session.timestamp > SESSION_DURATION) {
          localStorage.removeItem('admin_session');
          window.location.href = 'login.html';
          return null;
        }
        return session;
      } catch (e) {
        localStorage.removeItem('admin_session');
        window.location.href = 'login.html';
        return null;
      }
    }
    
    const session = checkSession();
    if (!session) throw new Error('Session expired');
    
    const admin = session.admin;
    
    if (admin.role !== 'سازنده' && admin.role !== 'مالک') {
      window.location.href = 'dashboard.html';
    }
    
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('i');
    
    const savedTheme = localStorage.getItem('heyat-theme');
    if (savedTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      themeIcon.classList.replace('fa-moon', 'fa-sun');
    }
    
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      
      if (currentTheme === 'dark') {
        document.documentElement.removeAttribute('data-theme');
        themeIcon.classList.replace('fa-sun', 'fa-moon');
        localStorage.setItem('heyat-theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        themeIcon.classList.replace('fa-moon', 'fa-sun');
        localStorage.setItem('heyat-theme', 'dark');
      }
    });
    
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('admin_session');
      window.location.href = 'login.html';
    });
    
    const actionLabels = {
      'add': 'افزودن',
      'edit': 'ویرایش',
      'delete': 'حذف'
    };
    
    const actionIcons = {
      'add': 'fa-plus-circle',
      'edit': 'fa-pen-to-square',
      'delete': 'fa-trash-can'
    };
    
    const typeLabels = {
      'event': 'مراسم',
      'announcement': 'اطلاعیه',
      'archive': 'آرشیو',
      'admin': 'مدیر'
    };
    
    async function loadLogs() {
      const list = document.getElementById('logsList');
      
      try {
        const [logsRes, adminsRes] = await Promise.all([
          fetch(API_URL + '?action=getLogs', {
            method: 'POST',
            body: JSON.stringify({ adminId: admin.id })
          }),
          fetch(API_URL + '?action=getAdmins', {
            method: 'POST',
            body: JSON.stringify({ adminId: admin.id })
          })
        ]);
        
        const logsData = await logsRes.json();
        const adminsData = await adminsRes.json();
        
        const adminMap = {};
        if (adminsData.success && adminsData.data.length > 0) {
          adminsData.data.forEach(a => {
            adminMap[a.id] = a.name || a.username || a.id;
          });
        }
        
        if (logsData.success && logsData.data.length > 0) {
          logsData.data.sort((a, b) => {
            return new Date(b.date) - new Date(a.date);
          });
          
          list.innerHTML = logsData.data.map(log => {
            const adminName = adminMap[log.adminId] || log.adminId;
            
            return `
              <div class="log-card">
                <div class="log-icon ${log.action}">
                  <i class="fa-solid ${actionIcons[log.action] || 'fa-circle'}"></i>
                </div>
                <div class="log-info">
                  <div class="log-title">
                    ${actionLabels[log.action] || log.action} ${typeLabels[log.type] || log.type}
                  </div>
                  <div class="log-details">
                    <span><i class="fa-solid fa-user"></i> ${adminName}</span>
                    <span><i class="fa-solid fa-clock"></i> ${log.date}</span>
                  </div>
                </div>
                <span class="log-badge ${log.type}">${typeLabels[log.type] || log.type}</span>
                <span class="log-badge ${log.action}">${actionLabels[log.action] || log.action}</span>
              </div>
            `;
          }).join('');
        } else {
          list.innerHTML = `
            <div style="text-align: center; padding: 40px; color: var(--text-light);">
              <i class="fa-solid fa-clock-rotate-left" style="font-size: 44px; margin-bottom: 10px; display: block; opacity: 0.5;"></i>
              <p style="font-size: 13px;">گزارشی ثبت نشده است</p>
            </div>
          `;
        }
      } catch (e) {
        list.innerHTML = `
          <div style="text-align: center; padding: 40px; color: var(--text-light);">
            <i class="fa-solid fa-circle-exclamation" style="font-size: 44px; margin-bottom: 10px; display: block;"></i>
            <p style="font-size: 13px;">خطا در دریافت گزارش‌ها</p>
            <button onclick="loadLogs()" style="margin-top: 8px; padding: 6px 14px; background: var(--primary); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; font-family: inherit;">تلاش مجدد</button>
          </div>
        `;
      }
    }
    
    loadLogs();
  </script>

</body>
</html>
